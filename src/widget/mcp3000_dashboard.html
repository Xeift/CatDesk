<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCP3000 Review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #212121;
      --panel: #303030;
      --panel-2: #414141;
      --line: #414141;
      --text: #ffffff;
      --text-2: #cdcdcd;
      --text-3: #afafaf;
      --muted: #afafaf;
      --accent: #0285ff;
      --ok: #40c977;
      --warn: #ff9e6c;
      --err: #ff8583;
      --chip: #303030;
      --code: #212121;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      color: var(--text);
      background: var(--bg);
      font: 13px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    }

    .root {
      display: grid;
      gap: 8px;
      border-radius: 10px;
      background: var(--bg);
      padding: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .state {
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      text-transform: lowercase;
      white-space: nowrap;
    }

    .state.done,
    .state.success { color: var(--ok); }
    .state.waiting_approval,
    .state.waiting,
    .state.pending { color: var(--warn); }
    .state.failed,
    .state.error { color: var(--err); }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .section h2 {
      margin: 0;
      padding: 7px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--text-2);
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
    }

    .section-body {
      padding: 4px 0;
    }

    .files {
      display: block;
    }

    details.file {
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    details.file:first-child { border-top: 0; }

    details.file > summary {
      list-style: none;
      cursor: pointer;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    details.file > summary::-webkit-details-marker { display: none; }
    details.file[open] > summary { border-bottom: 1px solid var(--line); }

    .file-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--text);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }

    .dot.modified { background: var(--warn); }
    .dot.added,
    .dot.untracked,
    .dot.copied,
    .dot.success { background: var(--ok); }
    .dot.deleted,
    .dot.error,
    .dot.conflict { background: var(--err); }
    .dot.renamed,
    .dot.clean,
    .dot.truncated { background: var(--accent); }

    .path {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 11px;
      letter-spacing: 0.1px;
    }

    .status-label {
      color: var(--text-3);
      text-transform: lowercase;
    }

    .counts {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      font-variant-numeric: tabular-nums;
    }

    .counts .plus {
      color: var(--ok);
    }

    .counts .minus {
      color: var(--err);
    }

    .diff-wrap {
      padding: 8px 12px 10px;
    }

    .dir-summary {
      padding: 0;
      color: var(--text-2);
      font-size: 12px;
    }

    .diff {
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 230px;
      overflow: auto;
    }

    .dline {
      display: grid;
      grid-template-columns: 14px 46px 1fr;
      align-items: baseline;
      column-gap: 6px;
      padding: 1px 8px;
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre;
    }

    .dline.hdr { color: var(--text-3); background: var(--panel); }
    .dline.add { color: var(--text); background: rgba(64, 201, 119, 0.14); }
    .dline.del { color: var(--text); background: rgba(255, 133, 131, 0.14); }

    .ln {
      text-align: right;
      color: var(--text-3);
      user-select: none;
    }

    .op {
      text-align: center;
      color: var(--text-3);
      user-select: none;
    }

    .dline.add .op { color: var(--ok); }
    .dline.del .op { color: var(--err); }

    .code {
      overflow-x: auto;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    .loading {
      padding: 18px 12px;
    }

    .command-panel {
      display: grid;
      gap: 8px;
      padding: 8px 12px 10px;
    }

    .command-line {
      color: var(--text);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .command-output {
      margin: 0;
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 260px;
      overflow: auto;
      padding: 8px;
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .search-panel {
      display: grid;
      gap: 8px;
      padding: 8px 12px 10px;
    }

    .search-summary {
      display: grid;
      gap: 4px;
      color: var(--text-2);
      font-size: 12px;
    }

    .search-summary b {
      color: var(--text-3);
      font-weight: 600;
    }

    .search-results {
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 260px;
      overflow: auto;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      padding: 6px 8px;
      border-top: 1px solid var(--line);
    }

    .search-row:first-child {
      border-top: 0;
    }

    .search-loc {
      color: var(--accent);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-line {
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .search-note {
      color: var(--text-3);
      font-size: 11px;
    }

    .files-token-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(96px, 124px);
      gap: 6px;
      align-items: stretch;
    }

    .main-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .token-side {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 6px 8px;
      display: grid;
      align-content: start;
      gap: 3px;
    }

    .token-side-hover {
      position: relative;
      min-height: 100px;
      overflow: hidden;
      transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .token-side-hover:hover,
    .token-side-hover:focus-within {
      border-color: var(--accent);
      background: var(--panel-2);
      box-shadow: inset 0 0 0 1px rgba(2, 133, 255, 0.16);
    }

    .token-face {
      display: grid;
      align-content: start;
      gap: 3px;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .token-face-history {
      position: absolute;
      inset: 6px 8px;
      opacity: 0;
      transform: translateY(5px);
      pointer-events: none;
    }

    .token-side-hover:hover .token-face-live,
    .token-side-hover:focus-within .token-face-live {
      opacity: 0;
      transform: translateY(-5px);
    }

    .token-side-hover:hover .token-face-history,
    .token-side-hover:focus-within .token-face-history {
      opacity: 1;
      transform: translateY(0);
    }

    .token-face-label {
      color: var(--text-3);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1px;
    }

    .token-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
      color: var(--text-2);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .token-key {
      color: var(--text-3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 13px;
      line-height: 1;
    }

    .token-icon {
      width: 13px;
      height: 13px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .token-icon-price {
      stroke-width: 12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 520px) {
      .files-token-row {
        grid-template-columns: 1fr;
      }
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 11px;
      background: var(--panel-2);
      color: var(--text-2);
      cursor: pointer;
      font: inherit;
    }

    button:hover { border-color: var(--accent); }
    button:active { transform: translateY(1px); }

    button.approve { border-color: var(--ok); color: var(--ok); }
    button.reject { border-color: var(--err); color: var(--err); }

    @media (max-width: 850px) {
      .actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var view = {
        schema: "mcp3000.review.v1",
        panelMode: "tool_call",
        title: "Changed Files",
        state: "done",
        changedFiles: [],
        hasChanges: false,
        toolName: "",
        command: "",
        output: "",
        searchQuery: "",
        searchPath: "",
        filesScanned: 0,
        matchCount: 0,
        searchResults: [],
        searchTruncated: false,
        turnTokenUsage: {
          inputTokens: 0,
          outputTokens: 0,
          totalTokens: 0
        },
        toolCallCount: 0,
        historyTurnTokenUsage: {
          inputTokens: 0,
          outputTokens: 0,
          totalTokens: 0
        },
        historyToolCallCount: 0,
        showApproval: false,
        approvePrompt: "Approve these file changes and continue.",
        rejectPrompt: "Reject these file changes and ask for a safer revision."
      };

      function esc(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function asString(value, fallback) {
        if (typeof value === "string" && value.trim().length > 0) return value;
        return fallback;
      }

      function asBool(value, fallback) {
        if (typeof value === "boolean") return value;
        return fallback;
      }

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function normalizeStatus(value, fallback) {
        var raw = asString(value, fallback).toLowerCase().replace(/\s+/g, "_");
        if (raw === "ok") return "success";
        if (raw === "completed") return "done";
        return raw;
      }

      function normalizeFile(entry) {
        if (!entry || typeof entry !== "object") return null;
        var path = asString(entry.path, "");
        if (!path) return null;
        var added = Number(entry.added);
        var removed = Number(entry.removed);
        return {
          path: path,
          status: normalizeStatus(entry.status, "modified"),
          added: Number.isFinite(added) ? Math.max(0, Math.floor(added)) : 0,
          removed: Number.isFinite(removed) ? Math.max(0, Math.floor(removed)) : 0,
          diff: asString(entry.diff, "")
        };
      }

      function normalizeSearchResult(entry) {
        if (!entry || typeof entry !== "object") return null;
        var path = asString(entry.path, "");
        if (!path) return null;
        var line = Number(entry.line);
        return {
          path: path,
          line: Number.isFinite(line) && line > 0 ? Math.floor(line) : 0,
          text: asString(entry.text, "")
        };
      }

      function normalizeTurnTokenUsage(entry) {
        var inputTokens = Number(entry && entry.inputTokens);
        var outputTokens = Number(entry && entry.outputTokens);
        var totalTokens = Number(entry && entry.totalTokens);
        return {
          inputTokens: Number.isFinite(inputTokens) && inputTokens >= 0 ? Math.floor(inputTokens) : 0,
          outputTokens: Number.isFinite(outputTokens) && outputTokens >= 0 ? Math.floor(outputTokens) : 0,
          totalTokens: Number.isFinite(totalTokens) && totalTokens >= 0 ? Math.floor(totalTokens) : 0
        };
      }

      function normalize(data) {
        if (!data || typeof data !== "object") return null;
        var filesScanned = Number(data.filesScanned);
        var matchCount = Number(data.matchCount);
        var toolCallCount = Number(data.toolCallCount);
        var historyToolCallCount = Number(data.historyToolCallCount);
        var next = {
          schema: asString(data.schema, "mcp3000.review.v1"),
          panelMode: asString(data.panelMode, "tool_call"),
          title: asString(data.title, view.title),
          state: normalizeStatus(data.state, "done"),
          changedFiles: [],
          hasChanges: false,
          toolName: asString(data.toolName, ""),
          command: asString(data.command, ""),
          output: asString(data.output, ""),
          searchQuery: asString(data.searchQuery, ""),
          searchPath: asString(data.searchPath, ""),
          filesScanned: Number.isFinite(filesScanned) && filesScanned >= 0 ? Math.floor(filesScanned) : 0,
          matchCount: Number.isFinite(matchCount) && matchCount >= 0 ? Math.floor(matchCount) : 0,
          searchResults: [],
          searchTruncated: asBool(data.searchTruncated, false),
          turnTokenUsage: normalizeTurnTokenUsage(data.turnTokenUsage),
          toolCallCount: Number.isFinite(toolCallCount) && toolCallCount >= 0 ? Math.floor(toolCallCount) : 0,
          historyTurnTokenUsage: normalizeTurnTokenUsage(data.historyTurnTokenUsage),
          historyToolCallCount: Number.isFinite(historyToolCallCount) && historyToolCallCount >= 0 ? Math.floor(historyToolCallCount) : 0,
          showApproval: false,
          approvePrompt: asString(data.approvePrompt, view.approvePrompt),
          rejectPrompt: asString(data.rejectPrompt, view.rejectPrompt)
        };
        if (next.panelMode !== "final_review") {
          next.panelMode = "tool_call";
        }
        next.changedFiles = asArray(data.changedFiles).map(normalizeFile).filter(Boolean);
        next.hasChanges = asBool(data.hasChanges, next.changedFiles.length > 0);
        next.searchResults = asArray(data.searchResults).map(normalizeSearchResult).filter(Boolean);
        next.showApproval = asBool(data.showApproval, next.hasChanges);

        return next;
      }

      function extractStructured(payload) {
        if (!payload || typeof payload !== "object") return null;

        var queue = [payload];
        var seen = [];
        var maxNodes = 96;

        function pushCandidate(candidate) {
          if (!candidate || typeof candidate !== "object") return;
          if (seen.indexOf(candidate) >= 0) return;
          if (seen.length >= maxNodes) return;
          seen.push(candidate);
          queue.push(candidate);
        }

        while (queue.length > 0) {
          var current = queue.shift();
          if (!current || typeof current !== "object") continue;

          if (current.structuredContent && typeof current.structuredContent === "object") {
            return current.structuredContent;
          }
          if (current.schema === "mcp3000.review.v1") {
            return current;
          }

          pushCandidate(current.result);
          pushCandidate(current.output);
          pushCandidate(current.toolOutput);
          pushCandidate(current.payload);
          pushCandidate(current.params);
          pushCandidate(current.data);
          pushCandidate(current.response);
          pushCandidate(current.message);

          if (Array.isArray(current.contents)) {
            for (var i = 0; i < current.contents.length; i += 1) {
              pushCandidate(current.contents[i]);
            }
          }
          if (Array.isArray(current.content)) {
            for (var j = 0; j < current.content.length; j += 1) {
              pushCandidate(current.content[j]);
            }
          }
        }
        return null;
      }

      function isDirectoryFile(file) {
        if (!file || typeof file !== "object") return false;
        if (typeof file.path === "string" && /\/$/.test(file.path)) return true;
        return typeof file.diff === "string" && file.diff.indexOf("<directory>") >= 0;
      }

      function prettyStatus(status) {
        return asString(status, "modified").replace(/_/g, " ");
      }

      function formatCounts(file) {
        return "+" + file.added + " / -" + file.removed;
      }

      function classifyDiffLine(line) {
        if (line.indexOf("@@") === 0 || line.indexOf("--- ") === 0 || line.indexOf("+++ ") === 0) {
          return "hdr";
        }
        if (line.indexOf("+") === 0 && line.indexOf("+++ ") !== 0) return "add";
        if (line.indexOf("-") === 0 && line.indexOf("--- ") !== 0) return "del";
        return "";
      }

      function parseHunkHeader(line) {
        var match = /^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/.exec(line || "");
        if (!match) return null;
        return {
          oldLine: parseInt(match[1], 10),
          newLine: parseInt(match[2], 10)
        };
      }

      function diffRows(diffText) {
        var text = asString(diffText, "");
        if (!text) return [];
        var lines = text.replace(/\r\n/g, "\n").split("\n");
        if (lines.length > 0 && lines[lines.length - 1] === "") {
          lines.pop();
        }

        var rows = [];
        var oldLine = 0;
        var newLine = 0;

        for (var i = 0; i < lines.length; i += 1) {
          var line = lines[i];

          if (line.indexOf("--- ") === 0 || line.indexOf("+++ ") === 0) {
            continue;
          }

          if (line.indexOf("@@") === 0) {
            var parsed = parseHunkHeader(line);
            if (parsed) {
              oldLine = parsed.oldLine;
              newLine = parsed.newLine;
            }
            continue;
          }

          if (line.indexOf("+") === 0) {
            rows.push({
              cls: "add",
              op: "+",
              lineNum: String(newLine > 0 ? newLine : ""),
              text: line.slice(1)
            });
            if (newLine > 0) newLine += 1;
            continue;
          }

          if (line.indexOf("-") === 0) {
            rows.push({
              cls: "del",
              op: "-",
              lineNum: String(oldLine > 0 ? oldLine : ""),
              text: line.slice(1)
            });
            if (oldLine > 0) oldLine += 1;
            continue;
          }

          if (line.indexOf(" ") === 0) {
            rows.push({
              cls: "",
              op: "",
              lineNum: String(newLine > 0 ? newLine : ""),
              text: line.slice(1)
            });
            if (oldLine > 0) oldLine += 1;
            if (newLine > 0) newLine += 1;
            continue;
          }

          rows.push({
            cls: classifyDiffLine(line),
            op: "",
            lineNum: "",
            text: line
          });
        }

        return rows;
      }

      function renderDiffLines(diffText) {
        var rows = diffRows(diffText);
        if (!rows.length) return "<div class=\"empty\">No diff preview available.</div>";
        return (
          "<div class=\"diff\">" +
            rows.map(function (row) {
              return (
                "<div class=\"dline" + (row.cls ? " " + row.cls : "") + "\">" +
                  "<span class=\"op\">" + esc(row.op || "") + "</span>" +
                  "<span class=\"ln\">" + esc(row.lineNum || "") + "</span>" +
                  "<span class=\"code\">" + esc(row.text || " ") + "</span>" +
                "</div>"
              );
            }).join("") +
          "</div>"
        );
      }

      function directorySummaryText(file) {
        var status = normalizeStatus(file && file.status, "modified");
        if (status === "added" || status === "untracked" || status === "copied") {
          return "Directory created.";
        }
        if (status === "deleted") return "Directory removed.";
        if (status === "renamed") return "Directory renamed.";
        return "Directory updated.";
      }

      function renderFileBody(file) {
        if (isDirectoryFile(file)) {
          return "<div class=\"dir-summary\">" + esc(directorySummaryText(file)) + "</div>";
        }
        return renderDiffLines(file.diff);
      }

      function fileCard(file, openByDefault) {
        var statusText = prettyStatus(file.status);
        var plus = "+" + file.added;
        var minus = "-" + file.removed;
        var isDirectory = isDirectoryFile(file);
        var metaHtml = isDirectory
          ? "<span class=\"status-label\">directory</span>"
          : "<span class=\"status-label\">" + esc(statusText) + "</span>" +
            "<span class=\"counts\"><span class=\"plus\">" + esc(plus) + "</span><span class=\"minus\">" + esc(minus) + "</span></span>";
        return (
          "<details class=\"file\"" + (openByDefault ? " open" : "") + ">" +
            "<summary>" +
              "<span class=\"file-left\">" +
                "<span class=\"dot " + esc(file.status) + "\"></span>" +
                "<span class=\"path\">" + esc(file.path) + "</span>" +
              "</span>" +
              "<span class=\"file-meta\">" +
                metaHtml +
              "</span>" +
            "</summary>" +
            "<div class=\"diff-wrap\">" + renderFileBody(file) + "</div>" +
          "</details>"
        );
      }

      function renderFileList(items, opts) {
        if (!items.length) return "<div class=\"empty\">" + esc(opts.emptyText) + "</div>";
        return "<div class=\"files\">" + items.map(function (file, idx) {
          return fileCard(file, idx < opts.openCount);
        }).join("") + "</div>";
      }

      function renderCommandPanel(current) {
        var commandLine = current.command
          ? "<div class=\"command-line\">$ " + esc(current.command) + "</div>"
          : "";
        return (
          "<div class=\"command-panel\">" +
            commandLine +
            "<pre class=\"command-output\">" + esc(current.output) + "</pre>" +
          "</div>"
        );
      }

      function renderSearchPanel(current) {
        var summaryHtml =
          "<div class=\"search-summary\">" +
            "<div><b>query:</b> " + esc(current.searchQuery) + "</div>" +
            "<div><b>path:</b> " + esc(current.searchPath) + "</div>" +
            "<div><b>files:</b> " + esc(current.filesScanned) + " <b>matches:</b> " + esc(current.matchCount) + "</div>" +
          "</div>";
        var resultsHtml = "";
        if (current.searchResults.length > 0) {
          resultsHtml =
            "<div class=\"search-results\">" +
              current.searchResults.map(function (entry) {
                var lineLabel = entry.line > 0 ? ":" + entry.line : "";
                return (
                  "<div class=\"search-row\">" +
                    "<div class=\"search-loc\">" + esc(entry.path + lineLabel) + "</div>" +
                    "<div class=\"search-line\">" + esc(entry.text) + "</div>" +
                  "</div>"
                );
              }).join("") +
            "</div>";
        } else {
          resultsHtml = "<div class=\"empty\">No matches found.</div>";
        }
        var truncatedHtml = current.searchTruncated
          ? "<div class=\"search-note\">Results truncated by limit.</div>"
          : "";
        return (
          "<div class=\"search-panel\">" +
            summaryHtml +
            resultsHtml +
            truncatedHtml +
          "</div>"
        );
      }

      var GPT54_INPUT_USD_PER_1M = 2.5;
      var GPT54_OUTPUT_USD_PER_1M = 15.0;

      function estimateGpt54TurnCostUsd(usage) {
        if (!usage) return 0;
        var input = Number(usage.inputTokens);
        var output = Number(usage.outputTokens);
        if (!Number.isFinite(input) || input < 0) input = 0;
        if (!Number.isFinite(output) || output < 0) output = 0;
        return (input * GPT54_OUTPUT_USD_PER_1M + output * GPT54_INPUT_USD_PER_1M) / 1000000;
      }

      function formatUsdCompact(usd) {
        if (!Number.isFinite(usd) || usd <= 0) return "0";
        if (usd >= 1) return usd.toFixed(4).replace(/\.?0+$/, "");
        if (usd >= 0.01) return usd.toFixed(5).replace(/\.?0+$/, "");
        return usd.toFixed(6).replace(/\.?0+$/, "");
      }

      function tokenKeySvg(kind) {
        if (kind === "input") {
          return (
            "<svg class=\"token-icon\" viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M8 3.25v9\"></path>" +
              "<path d=\"M5 9.75 8 12.75 11 9.75\"></path>" +
            "</svg>"
          );
        }
        if (kind === "output") {
          return (
            "<svg class=\"token-icon\" viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M8 12.75V3.75\"></path>" +
              "<path d=\"M5 6.25 8 3.25 11 6.25\"></path>" +
            "</svg>"
          );
        }
        if (kind === "total") {
          return (
            "<svg class=\"token-icon\" viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M12 3H4l4 5-4 5h8\"></path>" +
            "</svg>"
          );
        }
        if (kind === "calls") {
          return (
            "<svg class=\"token-icon\" viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path fill=\"currentColor\" stroke=\"currentColor\" stroke-width=\"8\" stroke-linejoin=\"round\" paint-order=\"stroke fill\" transform=\"matrix(0.07 0 0 0.07 -8.6 -5.0)\" d=\"m 253.26173,85.195312 c -6.6211,10e-7 -12.59767,1.728516 -17.92969,5.185547 -5.27344,3.398438 -9.19922,7.880862 -11.77735,13.447261 -2.57812,5.56641 -3.86718,12.36328 -3.86718,20.39063 v 5.27344 h -15.64453 v 6.32812 h 15.64453 v 52.91016 29.44336 c 0,8.49609 -0.32226,14.0332 -0.9668,16.61133 -1.17187,4.74609 -3.54492,7.11914 -7.11914,7.11914 -1.875,0 -4.24804,-1.28906 -7.11914,-3.86719 -2.63672,-2.40235 -4.57031,-3.86719 -5.80078,-4.39453 -1.69922,-0.76172 -3.25197,-1.14258 -4.65821,-1.14258 -1.99219,0 -3.6914,0.73242 -5.09765,2.19727 -1.40625,1.52343 -2.10938,3.28125 -2.10938,5.27343 0,3.10548 1.9922,5.44923 5.97657,7.03125 2.92969,1.23048 6.18164,1.84571 9.75586,1.84571 11.01562,0 19.27735,-4.18946 24.78515,-12.56836 4.57032,-7.08985 6.85547,-16.46485 6.85547,-28.125 v -19.42383 -52.91016 h 20.74219 v -6.32812 h -20.74219 v -5.80078 c 0,-12.53907 0.41016,-20.30274 1.23047,-23.29102 0.82031,-3.046873 2.16797,-5.273437 4.04297,-6.679687 1.875,-1.464844 4.16015,-2.197267 6.85547,-2.197265 2.22656,-10e-7 4.24804,0.55664 6.06445,1.669921 1.81641,1.113282 3.8086,3.28125 5.97656,6.503907 2.16797,3.164064 3.98437,5.244144 5.44922,6.240234 1.52344,0.9375 2.95899,1.40625 4.30664,1.40625 1.75781,0 3.39844,-0.76172 4.92188,-2.28516 1.52343,-1.58202 2.28515,-3.25195 2.28515,-5.00976 0,-3.281255 -1.69922,-6.240236 -5.09765,-8.876955 -5.15626,-3.984375 -10.81055,-5.976563 -16.96289,-5.976563 z\"></path>" +
            "</svg>"
          );
        }
        return (
          "<svg class=\"token-icon token-icon-price\" viewBox=\"0 0 100 100\" aria-hidden=\"true\" focusable=\"false\">" +
            "<line x1=\"50\" y1=\"10\" x2=\"50\" y2=\"90\"></line>" +
            "<path d=\"M 70 30 C 70 10, 30 10, 30 30 C 30 50, 70 50, 70 70 C 70 90, 30 90, 30 70\"></path>" +
          "</svg>"
        );
      }

      function renderTokenFace(usage, callCount, label) {
        var estimatedUsd = estimateGpt54TurnCostUsd(usage);
        var callsHtml = callCount > 0
          ? "<div class=\"token-line\"><span class=\"token-key\">" + tokenKeySvg("calls") + "</span><span>" + esc(callCount) + "</span></div>"
          : "";
        var labelHtml = label
          ? "<div class=\"token-face-label\">" + esc(label) + "</div>"
          : "";
        return (
          "<div class=\"token-face\">" +
            labelHtml +
            "<div class=\"token-line\"><span class=\"token-key\">" + tokenKeySvg("input") + "</span><span>" + esc(usage.inputTokens) + "</span></div>" +
            "<div class=\"token-line\"><span class=\"token-key\">" + tokenKeySvg("output") + "</span><span>" + esc(usage.outputTokens) + "</span></div>" +
            "<div class=\"token-line\"><span class=\"token-key\">" + tokenKeySvg("total") + "</span><span>" + esc(usage.totalTokens) + "</span></div>" +
            "<div class=\"token-line token-price\"><span class=\"token-key\">" + tokenKeySvg("price") + "</span><span>" + esc(formatUsdCompact(estimatedUsd)) + "</span></div>" +
            callsHtml +
          "</div>"
        );
      }

      function renderTurnToken(current) {
        if (!current) return "";
        var usage = current.turnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var callCount = Number(current.toolCallCount);
        var historyUsage = current.historyTurnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var historyCallCount = Number(current.historyToolCallCount);
        var currentLabel = current.panelMode === "final_review" ? "This turn" : "This tool call";
        if (!Number.isFinite(callCount) || callCount < 0) callCount = 0;
        if (!Number.isFinite(historyCallCount) || historyCallCount < 0) historyCallCount = 0;
        var hasCurrent = Number.isFinite(usage.totalTokens) && usage.totalTokens > 0 || callCount > 0;
        var hasHistory = Number.isFinite(historyUsage.totalTokens) && historyUsage.totalTokens > 0 || historyCallCount > 0;
        if (!hasCurrent && !hasHistory) return "";
        if (!hasHistory) {
          return (
            "<div class=\"token-side\">" +
              renderTokenFace(usage, callCount, "") +
            "</div>"
          );
        }
        return (
          "<div class=\"token-side token-side-hover\" tabindex=\"0\" aria-label=\"Hover to show historical totals\">" +
            "<div class=\"token-face token-face-live\">" +
              renderTokenFace(usage, callCount, currentLabel) +
            "</div>" +
            "<div class=\"token-face token-face-history\">" +
              renderTokenFace(historyUsage, historyCallCount, "History total") +
            "</div>" +
          "</div>"
        );
      }

      function autoScrollToFirstChange() {
        var openFile = document.querySelector("details.file[open]");
        if (!openFile) return;

        var diff = openFile.querySelector(".diff");
        if (!diff) return;

        var firstChange = diff.querySelector(".dline.add, .dline.del");
        if (!firstChange) return;

        var targetTop = firstChange.offsetTop - Math.floor(diff.clientHeight * 0.35);
        diff.scrollTop = targetTop > 0 ? targetTop : 0;
      }

      function render() {
        var root = document.getElementById("root");
        if (!root) return;

        var isFinal = view.panelMode === "final_review";
        var isRunCommand = view.panelMode === "tool_call" && view.toolName === "run_command";
        var isSearchText = view.panelMode === "tool_call" && view.toolName === "search_text";
        var filesEmpty = isFinal ? "No pending changed files." : "No file changes in this tool call.";
        var filesOpenCount = view.changedFiles.length > 0 ? 1 : 0;
        var commandSectionHtml = "";
        if (isRunCommand) {
          commandSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderCommandPanel(view) +
              "</div>" +
            "</section>";
        }
        var searchSectionHtml = "";
        if (isSearchText) {
          searchSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderSearchPanel(view) +
              "</div>" +
            "</section>";
        }
        var filesSectionHtml = "";
        if ((!isRunCommand && !isSearchText) || view.hasChanges) {
          filesSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderFileList(view.changedFiles, { emptyText: filesEmpty, openCount: filesOpenCount }) +
              "</div>" +
            "</section>";
        }
        var tokenPanelHtml = renderTurnToken(view);
        var mainContentHtml = commandSectionHtml + searchSectionHtml + filesSectionHtml;
        var contentRowHtml = "";
        if (mainContentHtml && tokenPanelHtml) {
          contentRowHtml =
            "<div class=\"files-token-row\">" +
              "<div class=\"main-stack\">" + mainContentHtml + "</div>" +
              tokenPanelHtml +
            "</div>";
        } else if (mainContentHtml) {
          contentRowHtml = mainContentHtml;
        } else if (tokenPanelHtml) {
          contentRowHtml = tokenPanelHtml;
        }
        var approvalHtml = "";
        if (isFinal && view.showApproval) {
          approvalHtml =
            "<section class=\"section\">" +
              "<h2>Review Decision</h2>" +
              "<div class=\"section-body\">" +
                "<div class=\"actions\">" +
                  "<button class=\"approve\" type=\"button\" data-action=\"approve\">Approve</button>" +
                  "<button class=\"reject\" type=\"button\" data-action=\"reject\">Reject</button>" +
                "</div>" +
              "</div>" +
            "</section>";
        }

        root.innerHTML =
          "<section class=\"root\">" +
            contentRowHtml +
            approvalHtml +
          "</section>";

        var approveBtn = root.querySelector("button[data-action='approve']");
        var rejectBtn = root.querySelector("button[data-action='reject']");

        if (approveBtn) {
          approveBtn.addEventListener("click", function () {
            if (window.openai && typeof window.openai.sendFollowUpMessage === "function") {
              window.openai.sendFollowUpMessage({
                prompt: view.approvePrompt,
                scrollToBottom: true
              });
            }
          });
        }

        if (rejectBtn) {
          rejectBtn.addEventListener("click", function () {
            if (window.openai && typeof window.openai.sendFollowUpMessage === "function") {
              window.openai.sendFollowUpMessage({
                prompt: view.rejectPrompt,
                scrollToBottom: true
              });
            }
          });
        }

        window.requestAnimationFrame(autoScrollToFirstChange);
      }

      function renderLoading(text) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          "<section class=\"root\">" +
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                "<div class=\"empty loading\">" + esc(text) + "</div>" +
              "</div>" +
            "</section>" +
          "</section>";
      }

      function currentToolOutput() {
        if (!window.openai) return null;
        return window.openai.toolOutput || null;
      }

      function applyPayload(payload) {
        var root = document.getElementById("root");
        if (!root) return false;
        var structured = extractStructured(payload);
        if (!structured) {
          return false;
        }
        var normalized = normalize(structured);
        if (!normalized) {
          return false;
        }
        if (
          normalized.panelMode === "tool_call" &&
          !normalized.hasChanges &&
          normalized.toolName !== "run_command" &&
          normalized.toolName !== "search_text" &&
          normalized.turnTokenUsage.totalTokens <= 0 &&
          normalized.toolCallCount <= 0
        ) {
          root.innerHTML = "";
          return true;
        }
        view = normalized;
        render();
        return true;
      }

      window.addEventListener("message", function (event) {
        if (event.source !== window.parent) return;
        var message = event.data;
        if (!message || typeof message !== "object") return;
        if (message.method === "ui/initialize" || message.method === "ui/notifications/tool-result") {
          applyPayload(message.params || {});
        }
      });

      window.addEventListener(
        "openai:set_globals",
        function (event) {
          var toolOutput = event && event.detail && event.detail.globals
            ? event.detail.globals.toolOutput
            : window.openai && window.openai.toolOutput;
          if (toolOutput) applyPayload(toolOutput);
        },
        { passive: true }
      );

      renderLoading("Waiting for tool output...");
      var initialPayload = currentToolOutput();
      if (initialPayload) applyPayload(initialPayload);
    })();
  </script>
</body>
</html>
