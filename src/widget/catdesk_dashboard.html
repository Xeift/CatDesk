<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CatDesk Review</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #212121;
        --panel: #383838;
        --panel-2: #414141;
        --line: #414141;
        --text: #ffffff;
        --text-2: #cdcdcd;
        --text-3: #afafaf;
        --muted: #afafaf;
        --text-inverted: #fafafa;
        --accent: #0285ff;
        --ok: #40c977;
        --warn: #ff9e6c;
        --err: #ff8583;
        --chip: #383838;
        --code: #212121;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 12px;
        color: var(--text);
        background: var(--bg);
        font:
          13px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
      }

      .root {
        display: grid;
        gap: 8px;
        border-radius: 10px;
        background: var(--bg);
        padding: 10px;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .title {
        margin: 0;
        font-size: 14px;
        color: var(--text);
        font-weight: 700;
        letter-spacing: 0.2px;
      }

      .state {
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: var(--muted);
        text-transform: lowercase;
        white-space: nowrap;
      }

      .state.done,
      .state.success {
        color: var(--ok);
      }
      .state.waiting,
      .state.pending {
        color: var(--warn);
      }
      .state.failed,
      .state.error {
        color: var(--err);
      }

      .section {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        overflow: hidden;
      }

      .section h2 {
        margin: 0;
        padding: 7px 10px;
        border-bottom: 1px solid var(--line);
        color: var(--text-2);
        font-size: 12px;
        text-transform: none;
        letter-spacing: 0;
      }

      .section-body {
        padding: 4px 0;
      }

      .files {
        display: block;
      }

      details.file {
        border: 0;
        border-top: 1px solid var(--line);
        background: transparent;
      }

      details.file:first-child {
        border-top: 0;
      }

      details.file > summary {
        list-style: none;
        cursor: pointer;
        padding: 9px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      details.file > summary::-webkit-details-marker {
        display: none;
      }
      details.file[open] > summary {
        border-bottom: 1px solid var(--line);
      }

      .file-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        color: var(--text);
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--muted);
        flex: 0 0 auto;
      }

      .dot.modified {
        background: var(--warn);
      }
      .dot.added,
      .dot.untracked,
      .dot.copied,
      .dot.success {
        background: var(--ok);
      }
      .dot.deleted,
      .dot.error,
      .dot.conflict {
        background: var(--err);
      }
      .dot.renamed,
      .dot.clean,
      .dot.truncated {
        background: var(--accent);
      }

      .path {
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-meta {
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
        color: var(--muted);
        white-space: nowrap;
        font-size: 11px;
        letter-spacing: 0.1px;
      }

      .status-label {
        color: var(--text-3);
        text-transform: lowercase;
      }

      .counts {
        display: inline-flex;
        align-items: baseline;
        gap: 6px;
        font-variant-numeric: tabular-nums;
      }

      .counts .plus {
        color: var(--ok);
      }

      .counts .minus {
        color: var(--err);
      }

      .diff-wrap {
        padding: 8px 12px 10px;
      }

      .dir-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0;
        color: var(--text-2);
        font-size: 12px;
      }

      .dir-summary .listing-kind {
        color: var(--text-2);
      }

      .diff {
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 230px;
        overflow: auto;
      }

      .dline {
        display: grid;
        grid-template-columns: 14px 46px 1fr;
        align-items: baseline;
        column-gap: 6px;
        padding: 1px 8px;
        color: var(--text-2);
        font:
          12px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre;
      }

      .dline.hdr {
        color: var(--text-3);
        background: var(--panel);
      }
      .dline.add {
        color: var(--text);
        background: rgba(64, 201, 119, 0.14);
      }
      .dline.del {
        color: var(--text);
        background: rgba(255, 133, 131, 0.14);
      }

      .ln {
        text-align: right;
        color: var(--text-3);
        user-select: none;
      }

      .op {
        text-align: center;
        color: var(--text-3);
        user-select: none;
      }

      .dline.add .op {
        color: var(--ok);
      }
      .dline.del .op {
        color: var(--err);
      }

      .code {
        overflow-x: auto;
      }

      .empty {
        color: var(--muted);
        font-style: italic;
      }

      .loading {
        padding: 18px 12px;
      }

      .command-panel {
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .command-line {
        color: var(--text);
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .command-output {
        margin: 0;
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 260px;
        overflow: auto;
        padding: 8px;
        color: var(--text-2);
        font:
          12px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .search-panel {
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .search-summary {
        display: grid;
        gap: 6px;
        color: var(--text-2);
        font-size: 12px;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .panel-head.kicker-only {
        justify-content: flex-end;
      }

      .panel-title {
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: lowercase;
      }

      .panel-kicker {
        color: var(--text-3);
        font-size: 11px;
        text-transform: lowercase;
        white-space: nowrap;
      }

      .summary-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
      }

      .summary-row.metrics {
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 1px;
      }

      .summary-row.with-kicker .summary-stat.path {
        flex: 1 1 auto;
        min-width: 0;
      }

      .summary-kicker {
        margin-left: auto;
        flex: 0 0 auto;
      }

      .summary-stat {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
        color: var(--text-2);
      }

      .summary-stat.query {
        color: var(--text);
      }

      .summary-stat.path {
        max-width: 100%;
      }

      .summary-stat.other {
        color: var(--text-3);
      }

      .summary-stat svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .summary-value {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .search-results {
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 260px;
        overflow: auto;
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
        padding: 6px 8px;
        border-top: 1px solid var(--line);
      }

      .search-row:first-child {
        border-top: 0;
      }

      .search-loc {
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .search-line {
        color: var(--text-2);
        font:
          12px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .search-note {
        color: var(--text-3);
        font-size: 11px;
      }

      .listing-panel {
        display: grid;
        gap: 8px;
        padding: 8px 12px 10px;
      }

      .listing-summary {
        display: grid;
        gap: 6px;
        color: var(--text-2);
        font-size: 12px;
      }

      .listing-results {
        border: 0;
        border-radius: 0;
        background: var(--bg);
        max-height: 260px;
        overflow: auto;
      }

      .listing-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-top: 1px solid var(--line);
        min-width: 0;
      }

      .listing-row:first-child {
        border-top: 0;
      }

      .listing-row.other .listing-kind {
        color: var(--text-3);
      }

      .listing-kind {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-2);
      }

      .listing-kind svg {
        width: 14px;
        height: 14px;
        display: block;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .listing-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .listing-note {
        color: var(--text-3);
        font-size: 11px;
      }

      .instruction-panel {
        display: grid;
        gap: 12px;
        padding: 10px 12px 12px;
      }

      .instruction-paths {
        display: grid;
        gap: 8px;
      }

      .instruction-path-stat {
        width: 100%;
        display: grid;
        grid-template-columns: 14px 74px minmax(0, 1fr);
        align-items: center;
        column-gap: 6px;
      }

      .instruction-path-stat.has-action {
        grid-template-columns: 14px 74px auto;
        justify-content: start;
      }

      .instruction-path-label {
        color: var(--text-3);
        font-size: 11px;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;
      }

      .instruction-path-code {
        min-width: 0;
        width: fit-content;
        max-width: min(100%, 440px);
        justify-self: start;
        display: inline-flex;
        align-items: center;
        height: 26px;
        overflow: hidden;
        text-overflow: ellipsis;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        color: var(--text-2);
        font:
          11px/1.35 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: nowrap;
      }

      .instruction-path-combo {
        min-width: 0;
        display: inline-flex;
        align-items: stretch;
        justify-self: start;
        height: 26px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        overflow: hidden;
      }

      .instruction-path-combo .instruction-path-code {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding-right: 8px;
      }

      .instruction-path-action {
        width: 30px;
        height: 100%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 0;
        border-left: 1px solid var(--line);
        background: transparent;
        color: var(--text-2);
        cursor: pointer;
      }

      .instruction-path-action svg {
        width: 15px;
        height: 15px;
        display: block;
        stroke: none !important;
        fill: currentColor !important;
      }

      .instruction-path-action:hover,
      .instruction-path-action:focus-visible {
        background: var(--panel-2);
        color: var(--text);
        outline: none;
      }

      .instruction-path-trailing {
        display: inline-flex;
        align-items: center;
        gap: 0;
        justify-self: start;
      }

      .binagotchy-modal-root {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(12, 12, 14, 0.58);
        backdrop-filter: blur(3px);
      }

      .binagotchy-modal-root.is-open {
        display: flex;
      }

      .binagotchy-modal {
        position: relative;
        width: min(100%, 760px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        background: linear-gradient(180deg, #353332 0%, #2f2d2c 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
        overflow: hidden;
      }

      .binagotchy-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        background: rgba(0, 0, 0, 0.08);
      }

      .binagotchy-modal-title {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-2);
        letter-spacing: 0.02em;
      }

      .binagotchy-modal-close {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--bg-2);
        color: var(--text-3);
        font: inherit;
        cursor: pointer;
      }

      .binagotchy-modal-body {
        display: grid;
        gap: 12px;
        padding: 12px 14px 14px;
      }

      .binagotchy-browser-path {
        padding: 7px 9px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #242323;
        color: var(--text-2);
        font:
          11px/1.35 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
      }

      .binagotchy-browser-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
        gap: 10px;
        max-height: 340px;
        overflow: auto;
        padding-right: 2px;
      }

      .binagotchy-browser-card {
        position: relative;
        display: grid;
        grid-template-rows: auto auto;
        gap: 8px;
        padding: 10px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.02);
        align-content: start;
      }

      .binagotchy-browser-card.is-partner {
        border-color: rgba(115, 188, 255, 0.42);
        box-shadow: 0 0 0 1px rgba(115, 188, 255, 0.18) inset;
      }

      .binagotchy-browser-art {
        min-width: 0;
        min-height: 0;
        display: grid;
        place-items: center;
        aspect-ratio: 1 / 1;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #242323;
        overflow: hidden;
      }

      .binagotchy-browser-actions {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        opacity: 0;
        transform: translateY(4px);
        transition:
          opacity 0.16s ease,
          transform 0.16s ease;
        pointer-events: none;
      }

      .binagotchy-browser-card:hover .binagotchy-browser-actions,
      .binagotchy-browser-card:focus-within .binagotchy-browser-actions {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .binagotchy-browser-action {
        position: relative;
        width: 26px;
        height: 26px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(26, 25, 25, 0.92);
        color: var(--text-2);
        cursor: pointer;
        text-decoration: none;
      }

      .binagotchy-browser-action svg {
        width: 14px;
        height: 14px;
        display: block;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      .binagotchy-browser-action.is-active {
        color: #73bcff;
        border-color: rgba(115, 188, 255, 0.34);
        background: rgba(31, 54, 78, 0.72);
      }

      .binagotchy-browser-action::after {
        content: attr(data-tooltip);
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        padding: 5px 7px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 7px;
        background: rgba(26, 25, 25, 0.96);
        color: var(--text-2);
        font-size: 10px;
        line-height: 1.2;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(4px);
        pointer-events: none;
        transition:
          opacity 0.12s ease,
          transform 0.12s ease;
      }

      .binagotchy-browser-action:hover::after,
      .binagotchy-browser-action:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .binagotchy-browser-art img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        image-rendering: pixelated;
      }

      .binagotchy-browser-seed {
        min-width: 0;
        color: var(--text-2);
        font:
          11px/1.35 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        line-height: 1.25;
        word-break: break-all;
        overflow: hidden;
      }

      .binagotchy-browser-footer {
        color: var(--text-3);
        font-size: 11px;
      }

      .binagotchy-notice-root {
        position: absolute;
        inset: 0;
        z-index: 4;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(12, 12, 14, 0.58);
        backdrop-filter: blur(2px);
      }

      .binagotchy-notice-root.is-open {
        display: flex;
      }

      .binagotchy-notice {
        width: min(100%, 360px);
        display: grid;
        gap: 12px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: linear-gradient(180deg, #353332 0%, #2f2d2c 100%);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.42);
      }

      .binagotchy-notice-title {
        margin: 0;
        color: var(--text-2);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .binagotchy-notice-message {
        color: var(--text-2);
        font-size: 12px;
        line-height: 1.45;
        word-break: break-word;
      }

      .binagotchy-notice-message a {
        color: var(--text);
        text-decoration: underline;
      }

      .binagotchy-notice-message code {
        display: inline;
        padding: 0 4px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #242323;
        color: var(--text-2);
        font:
          11px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
      }

      .binagotchy-notice-code {
        display: none;
        margin: -2px 0 0;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #242323;
        color: var(--text-2);
        font:
          11px/1.45 "SFMono-Regular",
          Menlo,
          Consolas,
          "Liberation Mono",
          monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .binagotchy-notice-code.is-open {
        display: block;
      }

      .binagotchy-notice-actions {
        display: flex;
        justify-content: flex-end;
      }

      .binagotchy-notice-button {
        min-width: 72px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(26, 25, 25, 0.92);
        color: var(--text-2);
        font: inherit;
        cursor: pointer;
      }

      .instruction-hero {
        position: relative;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        cursor: pointer;
        background:
          radial-gradient(
            circle at 50% 0%,
            rgba(2, 133, 255, 0.16),
            transparent 42%
          ),
          linear-gradient(180deg, #1f252c 0%, #1b1f24 100%);
        padding: 18px 12px 12px;
      }

      .instruction-impact-flash {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(250, 250, 250, 0.1),
          transparent 26%
        );
        opacity: 0;
        pointer-events: none;
        animation: instruction-flash-hit 0.14s 0.64s forwards;
      }

      @keyframes instruction-flash-hit {
        0% {
          opacity: 0;
        }

        }
        30% {
          transform: translate(8px, -50%) scale(1);

      @media (max-width: 520px) {
        .files-token-row {
          grid-template-columns: 1fr;
        }
      }

        function validateArrayEntries(value, validator) {

          return value.reduce(function (items, entry) {
            if (items === null) return null;
            var nextEntry = validator(entry);

            items.push(nextEntry);
            return items;

        function validateStringArray(value, allowEmpty) {
          return validateArrayEntries(value, function (entry) {
            var text = readString(entry);
            if (text === null) return null;
            if (!allowEmpty && text.length === 0) return null;
            return text;
          });

        function invalidPayload(message) {

        function buildViewFromWidgetPayload(data) {
          if (!isPlainObject(data)) {
            return invalidPayload("Widget payload must be a JSON object.");
          }
          if (data.schema !== "catdesk.review.v1") {
            return invalidPayload(
              "Widget payload schema must be catdesk.review.v1.",
            );
          }

          var panelMode = readNonEmptyString(data.panelMode);
          if (panelMode !== "tool_call" && panelMode !== "final_review") {
            return invalidPayload(
              "Widget payload panelMode must be tool_call or final_review.",
            );
          }

          var title = readString(data.title);
          var state = readNonEmptyString(data.state);
          var toolName = readNonEmptyString(data.toolName);
          var changedFiles = validateArrayEntries(data.changedFiles, validateFile);
          var hasChanges = readBoolean(data.hasChanges);
          var turnTokenUsage = validateTurnTokenUsage(data.turnTokenUsage);
          var toolCallCount = readNonNegativeInteger(data.toolCallCount);
          var historyTurnTokenUsage = validateTurnTokenUsage(
            data.historyTurnTokenUsage,
          );
          var historyToolCallCount = readNonNegativeInteger(
            data.historyToolCallCount,
          );
          if (
            title === null ||
            state === null ||
            toolName === null ||
            changedFiles === null ||
            hasChanges === null ||
            turnTokenUsage === null ||
            toolCallCount === null ||
            historyTurnTokenUsage === null ||
            historyToolCallCount === null
          ) {
            return invalidPayload(
              "Widget payload is missing required common fields.",
            );
          }
          if (hasChanges !== (changedFiles.length > 0)) {
            return invalidPayload(
              "Widget payload hasChanges does not match changedFiles.",
            );
          }

          var next = createBaseView({
            schema: data.schema,
            panelMode: panelMode,
            title: title,
            state: state,
            changedFiles: changedFiles,
            hasChanges: hasChanges,
            toolName: toolName,
            turnTokenUsage: turnTokenUsage,
            toolCallCount: toolCallCount,
            historyTurnTokenUsage: historyTurnTokenUsage,
            historyToolCallCount: historyToolCallCount,
          });
          var call = readOptionalStringField(data, "call");
          var detail = readOptionalStringField(data, "detail");
          if (call === null || detail === null) {
            return invalidPayload("Widget payload call/detail fields are invalid.");
          }
          next.call = call;
          next.detail = detail;

          if (panelMode === "final_review") {
            if (toolName !== "render_final_summary_widget") {
              return invalidPayload(
                "Final summary payload must use render_final_summary_widget.",
              );
            }
            return validPayload(next);
          }

          if (data.payloadKind === "widget_payload_error") {
            if (!next.call || !next.detail) {
              return invalidPayload(
                "Widget payload error panels must include call and detail.",
              );
            }
            return validPayload(next);
          }

          if (toolName === "catdesk_instruction") {
            var workspacePath = readNonEmptyString(data.workspacePath);
            var workspacePathDisplay = readNonEmptyString(
              data.workspacePathDisplay,
            );
            var agentsPath = readNonEmptyString(data.agentsPath);
            var agentsPathDisplay = readNonEmptyString(data.agentsPathDisplay);
            var configPath = readNonEmptyString(data.configPath);
            var configPathDisplay = readNonEmptyString(data.configPathDisplay);
            var binagotchyPath = readNonEmptyString(data.binagotchyPath);
            var binagotchyPathDisplay = readNonEmptyString(
              data.binagotchyPathDisplay,
            );
            var binagotchyApiBaseUrl = readString(data.binagotchyApiBaseUrl);
            var partnerBinagotchySeed = readString(data.partnerBinagotchySeed);
            var widgetMascot = validateMascotState(data.widgetMascot);
            var binagotchyCards = validateArrayEntries(
              data.binagotchyCards,
              validateBinagotchyCard,
            );
            if (
              workspacePath === null ||
              workspacePathDisplay === null ||
              agentsPath === null ||
              agentsPathDisplay === null ||
              configPath === null ||
              configPathDisplay === null ||
              binagotchyPath === null ||
              binagotchyPathDisplay === null ||
              binagotchyApiBaseUrl === null ||
              partnerBinagotchySeed === null ||
              widgetMascot === null ||
              binagotchyCards === null
            ) {
              return invalidPayload(
                "catdesk_instruction widget payload is missing required fields.",
              );
            }
            next.workspacePath = workspacePath;
            next.workspacePathDisplay = workspacePathDisplay;
            next.agentsPath = agentsPath;
            next.agentsPathDisplay = agentsPathDisplay;
            next.configPath = configPath;
            next.configPathDisplay = configPathDisplay;
            next.binagotchyPath = binagotchyPath;
            next.binagotchyPathDisplay = binagotchyPathDisplay;
            next.binagotchyApiBaseUrl = binagotchyApiBaseUrl;
            next.partnerBinagotchySeed = partnerBinagotchySeed;
            next.binagotchyCards = binagotchyCards;
            next.mascotWidth = widgetMascot.mascotWidth;
            next.mascotHeight = widgetMascot.mascotHeight;
            next.mascotFrameMs = widgetMascot.mascotFrameMs;
            next.mascotSpiritHeroBackground =
              widgetMascot.mascotSpiritHeroBackground;
            next.mascotPalette = widgetMascot.mascotPalette;
            next.mascotFrames = widgetMascot.mascotFrames;
            next.mascotSequence = widgetMascot.mascotSequence;
            return validPayload(next);
          }

          if (toolName === "run_command") {
            var command = readString(data.command);
            var output = readString(data.output);
            if (command === null || output === null) {
              return invalidPayload(
                "run_command widget payload is missing required fields.",
              );
            }
            next.command = command;
            next.output = output;
            return validPayload(next);
          }

          if (toolName === "search_text") {
            var searchQuery = readString(data.searchQuery);
            var searchPath = readNonEmptyString(data.searchPath);
            var filesScanned = readNonNegativeInteger(data.filesScanned);
            var matchCount = readNonNegativeInteger(data.matchCount);
            var searchResults = validateArrayEntries(
              data.searchResults,
              validateSearchResult,
            );
            var searchTruncated = readBoolean(data.searchTruncated);
            if (
              searchQuery === null ||
              searchPath === null ||
              filesScanned === null ||
              matchCount === null ||
              searchResults === null ||
              searchTruncated === null
            ) {
              return invalidPayload(
                "search_text widget payload is missing required fields.",
              );
            }
            next.searchQuery = searchQuery;
            next.searchPath = searchPath;
            next.filesScanned = filesScanned;
            next.matchCount = matchCount;
            next.searchResults = searchResults;
            next.searchTruncated = searchTruncated;
            return validPayload(next);
          }

          if (toolName === "read_file") {
            var readFilePath = readNonEmptyString(data.path);
            var readFileBytes = readNonNegativeInteger(data.bytes);
            var readFileText = readString(data.text);
            var readFileTruncated = readBoolean(data.truncated);
            if (
              readFilePath === null ||
              readFileBytes === null ||
              readFileText === null ||
              readFileTruncated === null
            ) {
              return invalidPayload(

            next.readFilePath = readFilePath;
            next.readFileBytes = readFileBytes;
            next.readFileText = readFileText;
            next.readFileTruncated = readFileTruncated;
            return validPayload(next);
          }

          if (toolName === "list_files") {
            var listPath = readNonEmptyString(data.listPath);
            var listItemCount = readNonNegativeInteger(data.listItemCount);
            var listDirectoryCount = readNonNegativeInteger(
              data.listDirectoryCount,
            );
            var listFileCount = readNonNegativeInteger(data.listFileCount);
            var listOtherCount = readNonNegativeInteger(data.listOtherCount);
            var listEntries = validateArrayEntries(
              data.listEntries,
              validateListEntry,
            );
            var listTruncated = readBoolean(data.listTruncated);
            var listLimit = readPositiveInteger(data.listLimit);
            if (

            next.listFileCount = listFileCount;
            next.listOtherCount = listOtherCount;
            next.listEntries = listEntries;
            next.listTruncated = listTruncated;
            next.listLimit = listLimit;
            return validPayload(next);
          }

          return validPayload(next);
        }

        function inspectPayloadDiagnostics(toolResponseMetadata) {
          var widgetPayload =
            toolResponseMetadata &&
            typeof toolResponseMetadata === "object" &&
            toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] &&
            typeof toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] === "object"
              ? toolResponseMetadata[WIDGET_PAYLOAD_META_KEY]
              : null;
          var status = "no_tool_response_metadata";
          if (toolResponseMetadata && typeof toolResponseMetadata === "object") {
            status = widgetPayload
              ? "pure_meta_connected"
              : "tool_response_metadata_missing_widget_payload";
          }
          return {
            status: status,
            hasToolResponseMetadata:
              !!toolResponseMetadata && typeof toolResponseMetadata === "object",
            toolResponseMetadataKeys: Object.keys(toolResponseMetadata || {}),
            hasWidgetPayload: !!widgetPayload,
            widgetPayloadSchema: asString(widgetPayload && widgetPayload.schema, ""),
            widgetPayloadProbe: asString(
              widgetPayload && widgetPayload.widgetPayloadProbe,
              "",
            ),
          };
        }

        function extractWidgetPayload(toolResponseMetadata) {
          var widgetPayload =
            toolResponseMetadata &&
            typeof toolResponseMetadata === "object" &&
            toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] &&
            typeof toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] === "object"
              ? toolResponseMetadata[WIDGET_PAYLOAD_META_KEY]
              : null;
          if (
            !widgetPayload ||
            widgetPayload.schema !== "catdesk.review.v1"
          ) {
            return null;
          }
          return cloneJsonValue(widgetPayload);
        }

        function isDirectoryFile(file) {
          if (!file || typeof file !== "object") return false;
          if (typeof file.path === "string" && /\/$/.test(file.path))
            return true;
          return (
            typeof file.diff === "string" &&
            file.diff.indexOf("<directory>") >= 0
          );
        }

        function prettyStatus(status) {
          return String(status).replace(/_/g, " ");
        }

        function formatCounts(file) {
          return "+" + file.added + " / -" + file.removed;
        }

        function classifyDiffLine(line) {
          if (
            line.indexOf("@@") === 0 ||
            line.indexOf("--- ") === 0 ||
            line.indexOf("+++ ") === 0
          ) {
            return "hdr";
          }
          if (line.indexOf("+") === 0 && line.indexOf("+++ ") !== 0)
            return "add";
          if (line.indexOf("-") === 0 && line.indexOf("--- ") !== 0)
            return "del";
          return "";
        }

        function parseHunkHeader(line) {
          var match = /^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/.exec(
            line || "",
          );
          if (!match) return null;
          return {
            oldLine: parseInt(match[1], 10),
            newLine: parseInt(match[2], 10),
          };
        }

        function diffRows(diffText) {
          var text = asString(diffText, "");
          if (!text) return [];
          var lines = text.replace(/\r\n/g, "\n").split("\n");
          if (lines.length > 0 && lines[lines.length - 1] === "") {
            lines.pop();
          }

          var rows = [];
          var oldLine = 0;
          var newLine = 0;

          for (var i = 0; i < lines.length; i += 1) {
            var line = lines[i];

            if (line.indexOf("--- ") === 0 || line.indexOf("+++ ") === 0) {
              continue;
            }

            if (line.indexOf("@@") === 0) {
              var parsed = parseHunkHeader(line);
              if (parsed) {
                oldLine = parsed.oldLine;
                newLine = parsed.newLine;
              }
              continue;
            }

            if (line.indexOf("+") === 0) {
              rows.push({
                cls: "add",
                op: "+",
                lineNum: String(newLine > 0 ? newLine : ""),
                text: line.slice(1),
              });
              if (newLine > 0) newLine += 1;
              continue;
            }

            if (line.indexOf("-") === 0) {
              rows.push({
                cls: "del",
                op: "-",
                lineNum: String(oldLine > 0 ? oldLine : ""),
                text: line.slice(1),
              });
              if (oldLine > 0) oldLine += 1;
              continue;
            }

            if (line.indexOf(" ") === 0) {
              rows.push({
                cls: "",
                op: "",
                lineNum: String(newLine > 0 ? newLine : ""),
                text: line.slice(1),
              });
              if (oldLine > 0) oldLine += 1;
              if (newLine > 0) newLine += 1;
              continue;
            }

            rows.push({
              cls: classifyDiffLine(line),
              op: "",
              lineNum: "",
              text: line,
            });
          }

          return rows;
        }

        function renderDiffLines(diffText) {
          var rows = diffRows(diffText);
          if (!rows.length)
            return '<div class="empty">No diff preview available.</div>';
          return (
            '<div class="diff">' +
            rows
              .map(function (row) {
                return (
                  '<div class="dline' +
                  (row.cls ? " " + row.cls : "") +
                  '">' +
                  '<span class="op">' +
                  esc(row.op || "") +
                  "</span>" +
                  '<span class="ln">' +
                  esc(row.lineNum || "") +
                  "</span>" +
                  '<span class="code">' +
                  esc(row.text || " ") +
                  "</span>" +
                  "</div>"
                );
              })
              .join("") +
            "</div>"
          );
        }

        function directoryLabel(file) {
          var path = asString(file && file.path, "");

        function renderDirectorySummary(file) {

        function directoryMetaLabel(file) {
          var status = file && file.status;
          if (status === "added") {
            return "directory created";
          }
          if (status === "deleted") {
            return "directory deleted";
          }
          if (status === "modified") {
            return "directory changed";
          }
          return "directory";

        function renderFileBody(file) {
          if (view.toolName === "make_directory" || isDirectoryFile(file)) {
            return renderDirectorySummary(file);
          }
          return renderDiffLines(file.diff);
        }

        function fileCard(file, openByDefault) {
          var statusText = prettyStatus(file.status);
          var plus = "+" + file.added;
          var minus = "-" + file.removed;
          var isDirectory =
            view.toolName === "make_directory" || isDirectoryFile(file);
          var metaHtml = isDirectory
            ? '<span class="status-label">' +
              esc(directoryMetaLabel(file)) +
              "</span>"
            : '<span class="status-label">' +
              esc(statusText) +
              "</span>" +
              '<span class="counts"><span class="plus">' +
              esc(plus) +
              '</span><span class="minus">' +
              esc(minus) +
              "</span></span>";
          return (
            '<details class="file"' +
            (openByDefault ? " open" : "") +
            ">" +
            "<summary>" +
            '<span class="file-left">' +
            '<span class="dot ' +
            esc(file.status) +
            '"></span>' +
            '<span class="path">' +
            esc(file.path) +
            "</span>" +
            "</span>" +
            '<span class="file-meta">' +
            metaHtml +
            "</span>" +
            "</summary>" +
            '<div class="diff-wrap">' +
            renderFileBody(file) +
            "</div>" +
            "</details>"
          );
        }

        function renderFileList(items, opts) {
          if (!items.length)
            return '<div class="empty">' + esc(opts.emptyText) + "</div>";
          return (
            '<div class="files">' +
            items
              .map(function (file, idx) {

        function renderCommandPanel(current) {
          var commandLine = current.command

          return (
            '<div class="command-panel">' +

        function renderReadFilePanel(current) {
          var summaryHtml =
            '<div class="search-summary">' +
            '<div class="summary-row metrics with-kicker">' +
            renderSummaryStat("path", "path", current.readFilePath, "path") +
            renderSummaryStat("file", "bytes", current.readFileBytes, "other") +
            '<span class="panel-kicker summary-kicker">file contents</span>' +

            "</div>";

            : '<div class="empty">File is empty.</div>';

          return (
            '<div class="search-panel">' +
            summaryHtml +
            textHtml +
            truncatedHtml +
            "</div>"

        function mascotPaletteIndex(symbol) {
          return MASCOT_ALPHABET.indexOf(symbol) - 1;

        function renderInstructionMascotFrame(current, frame) {
          if (typeof frame !== "string" || !frame) return "";
          if (current.mascotWidth <= 0 || current.mascotHeight <= 0) return "";
          var width = current.mascotWidth;
          var height = current.mascotHeight;
          if (frame.length !== width * height) return "";

          var html = [];
          for (var y = 0; y < height; y += 1) {
            var rowOffset = y * width;
            var x = 0;
            while (x < width) {
              var colorIndex = mascotPaletteIndex(frame.charAt(rowOffset + x));
              if (colorIndex < 0) {
                x += 1;
                continue;
              }
              var color = current.mascotPalette[colorIndex];
              if (!color) {
                x += 1;
                continue;
              }
              var runWidth = 1;
              while (x + runWidth < width) {
                var nextIndex = mascotPaletteIndex(
                  frame.charAt(rowOffset + x + runWidth),
                );
                if (nextIndex !== colorIndex) break;
                runWidth += 1;
              }
              html.push(
                '<div class="instruction-pixel" style="' +
                  "--x:" +
                  x +
                  ";" +
                  "--y:" +
                  y +
                  ";" +
                  "--w:" +
                  runWidth +
                  ";" +
                  "--instruction-color:" +
                  esc(color) +
                  ";" +
                  '"></div>',
              );
              x += runWidth;
            }
          }
          return html.join("");
        }

        function startInstructionMascotAnimation(hero, current) {
          var grid = hero.querySelector(".instruction-grid");
          if (!grid) return;
          stopInstructionMascotAnimation();
          var frames = current.mascotFrames;
          var sequence = current.mascotSequence;
          var frameMs = current.mascotFrameMs || 50;
          if (
            !Array.isArray(frames) ||
            frames.length === 0 ||
            !Array.isArray(sequence) ||
            sequence.length === 0
          ) {
            grid.innerHTML = "";
            return;
          }
          var stepIndex = 0;

          function applyStep() {
            var step = sequence[stepIndex];
            var frame = frames[step.frame] || frames[0] || "";
            grid.innerHTML = renderInstructionMascotFrame(current, frame);
            stepIndex = (stepIndex + 1) % sequence.length;
            instructionMascotState.timerId = window.setTimeout(
              applyStep,
              Math.max(1, step.repeat) * frameMs,
            );
          }

          applyStep();
        }

        function bindInstructionReplay(hero, current) {
          if (!hero) return;
          startInstructionMascotAnimation(hero, current);
          hero.addEventListener("click", function () {
            stopInstructionMascotAnimation();
            var replacement = hero.cloneNode(true);
            hero.replaceWith(replacement);
            bindInstructionReplay(replacement, current);
          });
        }

        function closeBinagotchyBrowser() {

        function openBinagotchyNotice(
          title,
          message,
          isError,
          codeValue,
          linkLabel,
          linkUrl,
          messageSuffix,
          inlineCodeValue,
          inlineCodeSuffix,
        ) {
          var noticeRoot = document.getElementById("binagotchy-notice-root");
          var titleNode = document.getElementById("binagotchy-notice-title");
          var messageNode = document.getElementById(
            "binagotchy-notice-message",
          );
          var codeNode = document.getElementById("binagotchy-notice-code");
          var okButton = document.querySelector(
            "[data-close-binagotchy-notice]",
          );
          if (!noticeRoot || !titleNode || !messageNode || !codeNode) return;
          titleNode.textContent = title || "Notice";
          messageNode.textContent = "";
          if (message) {
            messageNode.appendChild(document.createTextNode(message));
          }
          if (linkLabel && linkUrl) {
            if (message) {
              messageNode.appendChild(document.createTextNode(" "));
            }
            var linkNode = document.createElement("a");
            linkNode.href = linkUrl;
            linkNode.target = "_blank";
            linkNode.rel = "noreferrer noopener";
            linkNode.textContent = linkLabel;
            messageNode.appendChild(linkNode);
            if (messageSuffix) {
              messageNode.appendChild(
                document.createTextNode(" " + messageSuffix),
              );
            }
          } else if (messageSuffix) {
            if (message) {
              messageNode.appendChild(document.createTextNode(" "));
            }
            messageNode.appendChild(document.createTextNode(messageSuffix));
          }
          if (inlineCodeValue) {
            if (message || linkLabel || messageSuffix) {
              messageNode.appendChild(document.createTextNode(" "));
            }
            var inlineCodeNode = document.createElement("code");
            inlineCodeNode.textContent = inlineCodeValue;
            messageNode.appendChild(inlineCodeNode);
            if (inlineCodeSuffix) {
              messageNode.appendChild(
                document.createTextNode(" " + inlineCodeSuffix),
              );
            }
          }
          messageNode.classList.toggle("is-error", !!isError);
          codeNode.textContent = codeValue || "";
          codeNode.classList.toggle("is-open", !!codeValue);
          noticeRoot.classList.add("is-open");
          noticeRoot.setAttribute("aria-hidden", "false");
          if (okButton) okButton.focus();
        }

        function closeBinagotchyNotice() {
          var noticeRoot = document.getElementById("binagotchy-notice-root");
          var messageNode = document.getElementById(
            "binagotchy-notice-message",
          );
          var codeNode = document.getElementById("binagotchy-notice-code");
          if (!noticeRoot || !messageNode || !codeNode) return;
          noticeRoot.classList.remove("is-open");
          noticeRoot.setAttribute("aria-hidden", "true");
          messageNode.textContent = "";
          messageNode.classList.remove("is-error");
          codeNode.textContent = "";
          codeNode.classList.remove("is-open");
        }

        function applyWidgetMascotToView(mascot) {
          if (!view) return false;
          var mascotState = validateMascotState(mascot);
          if (!mascotState) return false;
          view.mascotWidth = mascotState.mascotWidth;
          view.mascotHeight = mascotState.mascotHeight;
          view.mascotFrameMs = mascotState.mascotFrameMs;
          view.mascotSpiritHeroBackground =
            mascotState.mascotSpiritHeroBackground;
          view.mascotPalette = mascotState.mascotPalette;
          view.mascotFrames = mascotState.mascotFrames;
          view.mascotSequence = mascotState.mascotSequence;
          return true;
        }

        function syncBinagotchyPartnerSelection(seed) {
          view.partnerBinagotchySeed = seed;
          view.binagotchyCards.forEach(function (card) {
            card.isPartner = card.seed === seed;
          });
          Array.prototype.forEach.call(
            document.querySelectorAll("[data-binagotchy-card-seed]"),
            function (cardNode) {
              var cardSeed = cardNode.getAttribute("data-binagotchy-card-seed");
              var isPartner = cardSeed === seed;
              cardNode.classList.toggle("is-partner", isPartner);
              var button = cardNode.querySelector("[data-set-partner-seed]");
              if (!button) return;
              button.classList.toggle("is-active", isPartner);
              button.setAttribute(
                "data-tooltip",
                isPartner ? "Current partner" : "Set as partner",
              );
              button.setAttribute(
                "aria-label",
                isPartner ? "Current partner" : "Set as partner",
              );
            },
          );
        }

        function submitBinagotchyPartner(button) {
          if (!button) return;
          var seed = button.getAttribute("data-set-partner-seed") || "";
          var url = button.getAttribute("data-set-partner-url") || "";
          if (!seed || !url) return;
          button.disabled = true;
          window
            .fetch(url, {
              method: "POST",
              headers: {
                "Content-Type":
                  "application/x-www-form-urlencoded;charset=UTF-8",
              },
              body: "seed=" + encodeURIComponent(seed),
            })
            .then(function (response) {
              if (!response.ok) {
                throw new Error("Failed to set Binagotchy partner");
              }
              return response.json();
            })
            .then(function (payload) {
              if (!payload || payload.ok !== true) {
                throw new Error("Failed to set Binagotchy partner");
              }
              syncBinagotchyPartnerSelection(seed);
              applyWidgetMascotToView(payload.widgetMascot);
              render();
              openBinagotchyBrowser();
            })
            .catch(function (error) {
              var message =
                error && error.message
                  ? error.message
                  : "Failed to set partner";
              var codeValue = "";
              var linkLabel = "";
              var linkUrl = "";
              var messageSuffix = "";
              var inlineCodeValue = "";
              var inlineCodeSuffix = "";
              if (message === "Failed to fetch") {
                message = "Failed to fetch. In ChatGPT, open";
                linkLabel = "Advanced connector settings";
                linkUrl =
                  "https://chatgpt.com/#settings/Connectors/Advanced";
                messageSuffix = "and turn off";
                inlineCodeValue = "Enforce CSP in developer mode";
                inlineCodeSuffix = "then refresh the page.";
              }
              console.error(error);
              openBinagotchyNotice(
                "Failed to set partner",
                message,
                true,
                codeValue,
                linkLabel,
                linkUrl,
                messageSuffix,
                inlineCodeValue,
                inlineCodeSuffix,
              );
            })
            .finally(function () {
              button.disabled = false;
            });
        }

        function saveBinagotchyFolder(button) {
          if (!button) return;
          var url = button.getAttribute("data-save-folder-url") || "";
          var folderName = button.getAttribute("data-save-folder-name") || "";
          if (!url) return;
          button.disabled = true;
          closeBinagotchyNotice();
          window
            .fetch(url, {
              method: "POST",
            })
            .then(function (response) {
              if (!response.ok) {
                return response
                  .json()
                  .catch(function () {
                    return null;
                  })
                  .then(function (payload) {
                    var message =
                      payload && payload.error
                        ? String(payload.error)
                        : "Failed to save Binagotchy folder";
                    throw new Error(message);
                  });
              }
              return response.json();
            })
            .then(function (payload) {
              if (!payload || payload.ok !== true || !payload.savedPath) {
                throw new Error("Failed to save Binagotchy folder");
              }
              openBinagotchyNotice(
                "Binagotchy saved",
                "Saved Binagotchy to:",
                false,
                payload.savedPath,
              );
            })
            .catch(function (error) {
              if (error && error.name === "AbortError") return;
              console.error(error);
              var fallbackMessage = folderName
                ? "Failed to save " + folderName
                : "Failed to save Binagotchy folder";
              openBinagotchyNotice(
                "Save failed",
                error && error.message ? error.message : fallbackMessage,
                true,
              );
            })
            .finally(function () {
              button.disabled = false;
            });
        }

        function bindBinagotchyBrowser(root) {
          if (!root) return;
          var openButton = root.querySelector("[data-open-binagotchy-browser]");
          var closeButton = root.querySelector(
            "[data-close-binagotchy-browser]",
          );
          var noticeCloseButton = root.querySelector(
            "[data-close-binagotchy-notice]",
          );
          var modal = root.querySelector("#binagotchy-browser-modal");
          if (openButton) {
            openButton.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopPropagation();
              openBinagotchyBrowser();
            });
          }
          if (closeButton) {
            closeButton.addEventListener("click", function (event) {
              event.preventDefault();
              closeBinagotchyBrowser();
            });
          }
          if (noticeCloseButton) {
            noticeCloseButton.addEventListener("click", function (event) {
              event.preventDefault();
              closeBinagotchyNotice();
            });
          }
          if (modal) {
            modal.addEventListener("click", function (event) {
              if (event.target === modal) closeBinagotchyBrowser();
            });
            modal.addEventListener("click", function (event) {
              var partnerButton = event.target.closest(
                "[data-set-partner-seed]",
              );
              if (!partnerButton) return;
              event.preventDefault();
              event.stopPropagation();
              submitBinagotchyPartner(partnerButton);
            });
            modal.addEventListener("click", function (event) {
              var saveButton = event.target.closest("[data-save-folder-url]");
              if (!saveButton) return;
              event.preventDefault();
              event.stopPropagation();
              saveBinagotchyFolder(saveButton);
            });
          }
          if (!binagotchyBrowserBindingsBound) {
            window.addEventListener("keydown", function (event) {
              if (isBinagotchyNoticeOpen()) return;
              if (event.key === "Escape") closeBinagotchyBrowser();
            });
            binagotchyBrowserBindingsBound = true;
          }
        }

        var GPT54_INPUT_USD_PER_1M = 2.5;
        var GPT54_OUTPUT_USD_PER_1M = 15.0;
        var PRICE_ANIMATION_DECIMALS = 6;

        function estimateGpt54TurnCostUsd(usage) {
          if (!usage) return 0;
          var input = Number(usage.inputTokens);
          var output = Number(usage.outputTokens);
          if (!Number.isFinite(input) || input < 0) input = 0;
          if (!Number.isFinite(output) || output < 0) output = 0;
          return (
            (input * GPT54_OUTPUT_USD_PER_1M +
              output * GPT54_INPUT_USD_PER_1M) /
            1000000
          );
        }

        function formatUsdAnimated(usd) {
          if (!Number.isFinite(usd) || usd <= 0)
            return "0." + "0".repeat(PRICE_ANIMATION_DECIMALS);
          return usd.toFixed(PRICE_ANIMATION_DECIMALS);
        }

        function formatUsdCompact(usd) {
          return formatUsdAnimated(usd).replace(/\.?0+$/, "");
        }

        function formatTokenNumber(value) {
          return Number(value).toLocaleString("en-US");
        }

        function formatTokenCompact(value) {
          var number = Number(value);
          if (!Number.isFinite(number)) return "0";
          var abs = Math.abs(number);
          if (abs < 1000) return formatTokenNumber(number);
          var units = [
            { value: 1000000000, suffix: "B" },
            { value: 1000000, suffix: "M" },
            { value: 1000, suffix: "K" },
          ];
          for (var i = 0; i < units.length; i += 1) {
            var unit = units[i];
            if (abs < unit.value) continue;
            var scaled = number / unit.value;
            var decimals = Math.abs(scaled) >= 100 ? 0 : 1;
            return scaled.toFixed(decimals).replace(/\.0$/, "") + unit.suffix;
          }
          return formatTokenNumber(number);
        }

        function renderTokenLine(kind, valueText, animate, titleText) {
          var priceClass = kind === "price" ? " token-price" : "";
          var titleAttr = titleText ? ' title="' + esc(titleText) + '"' : "";
          if (!animate) {
            return (
              '<div class="token-line' +
              priceClass +
              '"' +
              titleAttr +

              '<span class="token-key">' +
              tokenKeySvg(kind) +

          return (
            '<div class="token-line' +

            '<span class="token-key">' +
            tokenKeySvg(kind) +
            "</span>" +
            '<span class="token-value-wrap">' +
            '<span class="token-value-ghost">' +

            "</span>" +
            '<span class="token-value-text">' +
            esc(valueText) +
            "</span>" +
            "</span>" +
