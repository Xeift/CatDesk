<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CatDesk Review</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #212121;
      --panel: #383838;
      --panel-2: #414141;
      --line: #414141;
      --text: #ffffff;
      --text-2: #cdcdcd;
      --text-3: #afafaf;
      --muted: #afafaf;
      --text-inverted: #fafafa;
      --accent: #0285ff;
      --ok: #40c977;
      --warn: #ff9e6c;
      --err: #ff8583;
      --chip: #383838;
      --code: #212121;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 12px;
      color: var(--text);
      background: var(--bg);
      font: 13px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
    }

    .root {
      display: grid;
      gap: 8px;
      border-radius: 10px;
      background: var(--bg);
      padding: 10px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .title {
      margin: 0;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .state {
      border: 0;
      border-radius: 0;
      padding: 0;
      background: transparent;
      color: var(--muted);
      text-transform: lowercase;
      white-space: nowrap;
    }

    .state.done,
    .state.success { color: var(--ok); }
    .state.waiting,
    .state.pending { color: var(--warn); }
    .state.failed,
    .state.error { color: var(--err); }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .section h2 {
      margin: 0;
      padding: 7px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--text-2);
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
    }

    .section-body {
      padding: 4px 0;
    }

    .files {
      display: block;
    }

    details.file {
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    details.file:first-child { border-top: 0; }

    details.file > summary {
      list-style: none;
      cursor: pointer;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    details.file > summary::-webkit-details-marker { display: none; }
    details.file[open] > summary { border-bottom: 1px solid var(--line); }

    .file-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--text);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--muted);
      flex: 0 0 auto;
    }

    .dot.modified { background: var(--warn); }
    .dot.added,
    .dot.untracked,
    .dot.copied,
    .dot.success { background: var(--ok); }
    .dot.deleted,
    .dot.error,
    .dot.conflict { background: var(--err); }
    .dot.renamed,
    .dot.clean,
    .dot.truncated { background: var(--accent); }

    .path {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-meta {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      color: var(--muted);
      white-space: nowrap;
      font-size: 11px;
      letter-spacing: 0.1px;
    }

    .status-label {
      color: var(--text-3);
      text-transform: lowercase;
    }

    .counts {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      font-variant-numeric: tabular-nums;
    }

    .counts .plus {
      color: var(--ok);
    }

    .counts .minus {
      color: var(--err);
    }

    .diff-wrap {
      padding: 8px 12px 10px;
    }

    .dir-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      color: var(--text-2);
      font-size: 12px;
    }

    .dir-summary .listing-kind {
      color: var(--text-2);
    }

    .diff {
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 230px;
      overflow: auto;
    }

    .dline {
      display: grid;
      grid-template-columns: 14px 46px 1fr;
      align-items: baseline;
      column-gap: 6px;
      padding: 1px 8px;
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre;
    }

    .dline.hdr { color: var(--text-3); background: var(--panel); }
    .dline.add { color: var(--text); background: rgba(64, 201, 119, 0.14); }
    .dline.del { color: var(--text); background: rgba(255, 133, 131, 0.14); }

    .ln {
      text-align: right;
      color: var(--text-3);
      user-select: none;
    }

    .op {
      text-align: center;
      color: var(--text-3);
      user-select: none;
    }

    .dline.add .op { color: var(--ok); }
    .dline.del .op { color: var(--err); }

    .code {
      overflow-x: auto;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }

    .loading {
      padding: 18px 12px;
    }

    .command-panel {
      display: grid;
      gap: 8px;
      padding: 8px 12px 10px;
    }

    .command-line {
      color: var(--text);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .command-output {
      margin: 0;
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 260px;
      overflow: auto;
      padding: 8px;
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .search-panel {
      display: grid;
      gap: 8px;
      padding: 8px 12px 10px;
    }

    .search-summary {
      display: grid;
      gap: 6px;
      color: var(--text-2);
      font-size: 12px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-head.kicker-only {
      justify-content: flex-end;
    }

    .panel-title {
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: lowercase;
    }

    .panel-kicker {
      color: var(--text-3);
      font-size: 11px;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .summary-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .summary-row.metrics {
      flex-wrap: nowrap;
      overflow-x: auto;
      padding-bottom: 1px;
    }

    .summary-row.with-kicker .summary-stat.path {
      flex: 1 1 auto;
      min-width: 0;
    }

    .summary-kicker {
      margin-left: auto;
      flex: 0 0 auto;
    }

    .summary-stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      color: var(--text-2);
    }

    .summary-stat.query {
      color: var(--text);
    }

    .summary-stat.path {
      max-width: 100%;
    }

    .summary-stat.other {
      color: var(--text-3);
    }

    .summary-stat svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .summary-value {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .search-results {
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 260px;
      overflow: auto;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      padding: 6px 8px;
      border-top: 1px solid var(--line);
    }

    .search-row:first-child {
      border-top: 0;
    }

    .search-loc {
      color: var(--text-3);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-line {
      color: var(--text-2);
      font: 12px/1.45 "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .search-note {
      color: var(--text-3);
      font-size: 11px;
    }

    .listing-panel {
      display: grid;
      gap: 8px;
      padding: 8px 12px 10px;
    }

    .listing-summary {
      display: grid;
      gap: 6px;
      color: var(--text-2);
      font-size: 12px;
    }

    .listing-results {
      border: 0;
      border-radius: 0;
      background: var(--bg);
      max-height: 260px;
      overflow: auto;
    }

    .listing-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-top: 1px solid var(--line);
      min-width: 0;
    }

    .listing-row:first-child {
      border-top: 0;
    }

    .listing-row.other .listing-kind {
      color: var(--text-3);
    }

    .listing-kind {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-2);
    }

    .listing-kind svg {
      width: 14px;
      height: 14px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .listing-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }

    .listing-note {
      color: var(--text-3);
      font-size: 11px;
    }

    .instruction-panel {
      display: grid;
      gap: 12px;
      padding: 10px 12px 12px;
    }

    .instruction-paths {
      display: grid;
      gap: 8px;
    }

    .instruction-hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      background:
        radial-gradient(circle at 50% 0%, rgba(2, 133, 255, 0.16), transparent 42%),
        linear-gradient(180deg, #1f252c 0%, #1b1f24 100%);
      padding: 18px 12px 12px;
    }

    .instruction-impact-flash {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(250, 250, 250, 0.1), transparent 26%);
      opacity: 0;
      pointer-events: none;
      animation: instruction-flash-hit 0.14s 0.64s forwards;
    }

    @keyframes instruction-flash-hit {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .instruction-scene {
      --instruction-sz: 9px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      min-height: 246px;
    }

    .instruction-scene.instruction-is-shaking {
      animation: instruction-scene-shake 0.22s 0.64s;
    }

    @keyframes instruction-scene-shake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-3px, 2px); }
      50% { transform: translate(3px, -2px); }
      75% { transform: translate(-1px, 1px); }
      100% { transform: translate(0, 0); }
    }

    .instruction-cat-wrap {
      position: relative;
      width: calc(var(--instruction-sz) * 16);
      height: calc(var(--instruction-sz) * 16);
      transform-origin: bottom center;
      opacity: 0;
      animation: instruction-stomp 1.2s cubic-bezier(0.6, 0.04, 0.98, 0.33) forwards;
      z-index: 3;
    }

    @keyframes instruction-stomp {
      0% { transform: translateY(-1000px); opacity: 0; }
      20% { opacity: 1; }
      45% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(0) scaleY(0.4) scaleX(1.3); }
      65% { transform: translateY(-48px) scaleY(1.1) scaleX(0.9); }
      80% { transform: translateY(0) scaleY(0.8) scaleX(1.1); }
      100% { transform: translateY(0) scaleY(1) scaleX(1); opacity: 1; }
    }

    .instruction-grid {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .instruction-pixel {
      position: absolute;
      width: var(--instruction-sz);
      height: var(--instruction-sz);
    }

    .instruction-b { background: #728292; }
    .instruction-w { background: #ffffff; }
    .instruction-e { background: #40c977; }
    .instruction-k { background: #000000; }
    .instruction-pink { background: #cf6a87; }

    .instruction-dust-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .instruction-dust {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: var(--instruction-sz);
      height: var(--instruction-sz);
      margin-left: calc(var(--instruction-sz) * -0.5);
      background: #728292;
      opacity: 0;
      animation: instruction-dust-burst 0.68s 0.6s forwards;
      transform: translate(0, 0);
    }

    @keyframes instruction-dust-burst {
      0% { opacity: 0.9; transform: translate(0, 0); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    .instruction-table {
      width: calc(var(--instruction-sz) * 24);
      height: calc(var(--instruction-sz) * 2.5);
      margin-top: calc(var(--instruction-sz) * -1);
      background: #2d3436;
      box-shadow: 0 calc(var(--instruction-sz) * 1) 0 #1a1e1f;
      position: relative;
      z-index: 2;
      animation: instruction-table-impact 0.4s 0.6s ease-out forwards;
    }

    @keyframes instruction-table-impact {
      0% { transform: scaleY(1); }
      30% { transform: scaleY(0.5) translateY(15px); }
      100% { transform: scaleY(1) translateY(0); }
    }

    .instruction-table-leg {
      position: absolute;
      top: 100%;
      width: calc(var(--instruction-sz) * 2);
      height: calc(var(--instruction-sz) * 7);
      background: #2d3436;
      transform-origin: top center;
      animation: instruction-leg-impact 0.4s 0.6s forwards;
    }

    @keyframes instruction-leg-impact {
      0% { transform: scaleY(1); }
      30% { transform: scaleY(0.8); }
      100% { transform: scaleY(1); }
    }

    .instruction-logo-wrapper {
      margin-top: 58px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      min-height: 62px;
    }

    .instruction-word {
      font: italic 700 42px/1 "Arial Black", "Segoe UI Black", sans-serif;
      letter-spacing: 6px;
      position: relative;
    }

    .instruction-word-cat {
      min-width: 3.2ch;
      display: inline-flex;
      justify-content: center;
      margin-right: 8px;
      overflow: visible;
      position: relative;
    }

    .instruction-word-layer {
      display: inline-flex;
      align-items: flex-end;
      gap: 2px;
    }

    .instruction-glyph {
      display: block;
    }

    .instruction-word-label {
      display: inline-flex;
      position: relative;
      color: #d9f5ff;
      opacity: 0;
      transform-origin: center center;
      will-change: transform, gap, opacity;
      text-shadow: 0 0 8px rgba(217, 245, 255, 0.82), 0 0 18px rgba(143, 216, 255, 0.58), 0 0 28px rgba(30, 167, 255, 0.38);
      animation: instruction-cat-shrink 1s cubic-bezier(0.22, 0.82, 0.24, 1) forwards, instruction-gx-glitch 3s 2s infinite;
    }

    .instruction-word-label-trail {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      pointer-events: none;
    }

    .instruction-word-label-trail-red {
      color: rgba(30, 167, 255, 0.34);
      text-shadow: 0 0 12px rgba(30, 167, 255, 0.62), 0 0 28px rgba(30, 167, 255, 0.32);
      animation: instruction-cat-trail-red 0.96s cubic-bezier(0.22, 0.82, 0.24, 1) forwards;
    }

    .instruction-word-label-trail-white {
      color: rgba(217, 245, 255, 0.24);
      text-shadow: 0 0 16px rgba(217, 245, 255, 0.56), 0 0 30px rgba(143, 216, 255, 0.22);
      animation: instruction-cat-trail-white 0.92s cubic-bezier(0.22, 0.82, 0.24, 1) forwards;
    }

    .instruction-word-desk {
      color: #a7bed6;
      opacity: 0;
      text-shadow: 0 0 10px rgba(167, 190, 214, 0.18), 0 0 20px rgba(143, 216, 255, 0.06);
      animation: instruction-desk-appear 0.26s 0.86s cubic-bezier(0.2, 0.9, 0.2, 1) forwards;
    }

    @keyframes instruction-desk-appear {
      0% { opacity: 0; transform: translateX(14px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    @keyframes instruction-cat-shrink {
      0% { opacity: 0; transform: scale(3.2) translateY(1px); gap: 3px; }
      10% { opacity: 1; transform: scale(3.02) translateY(0.5px); gap: 4px; }
      26% { opacity: 1; transform: scale(3.1) translateY(-0.5px); gap: 6px; }
      42% { opacity: 1; transform: scale(2.92) translateY(0.6px); gap: 8px; }
      58% { opacity: 1; transform: scale(3) translateY(-0.4px); gap: 10px; }
      70% { opacity: 1; transform: scale(2.5) translateY(0); gap: 11px; }
      80% { opacity: 1; transform: scale(1.55); gap: 6px; }
      88% { opacity: 1; transform: scale(0.9); gap: 1px; }
      95% { opacity: 1; transform: scale(1.04); gap: 3.5px; }
      100% { opacity: 1; transform: scale(1); gap: 3px; }
    }

    @keyframes instruction-cat-trail-red {
      0% { opacity: 0; transform: scale(3.36) translateX(10px); gap: 3px; }
      14% { opacity: 0.26; transform: scale(3.12) translateX(8px); gap: 3.8px; }
      40% { opacity: 0.2; transform: scale(2.92) translateX(6px); gap: 5.6px; }
      62% { opacity: 0.12; transform: scale(2.34) translateX(2.4px); gap: 7px; }
      82% { opacity: 0.04; transform: scale(1.2) translateX(0.6px); gap: 4.4px; }
      100% { opacity: 0; transform: scale(1) translateX(0.2px); gap: 3px; }
    }

    @keyframes instruction-cat-trail-white {
      0% { opacity: 0; transform: scale(3.1) translateX(-9px); gap: 3px; }
      16% { opacity: 0.16; transform: scale(2.96) translateX(-7px); gap: 3.6px; }
      42% { opacity: 0.12; transform: scale(2.78) translateX(-4.5px); gap: 5.1px; }
      64% { opacity: 0.07; transform: scale(2.24) translateX(-2px); gap: 6.2px; }
      82% { opacity: 0.02; transform: scale(1.16) translateX(-0.5px); gap: 4px; }
      100% { opacity: 0; transform: scale(1) translateX(-0.2px); gap: 3px; }
    }

    @keyframes instruction-gx-glitch {
      0%, 95%, 100% { transform: scale(1); filter: none; }
      96% { transform: translate(-1px, 1px) scale(1); filter: drop-shadow(2px 0 0 rgba(30, 167, 255, 0.6)) drop-shadow(-2px 0 0 rgba(217, 245, 255, 0.42)); }
      97% { transform: translate(2px, -1px) scale(1); filter: drop-shadow(-2px 0 0 rgba(30, 167, 255, 0.6)) drop-shadow(2px 0 0 rgba(217, 245, 255, 0.38)); }
      98% { transform: scale(1); filter: none; }
    }

    .files-token-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(96px, 124px);
      gap: 6px;
      align-items: stretch;
    }

    .completion-shell {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      isolation: isolate;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    .completion-shell::before,
    .completion-shell::after {
      content: "";
      position: absolute;
      pointer-events: none;
      opacity: 0;
      z-index: 3;
    }

    .completion-shell::before {
      inset: -1px;
      border-radius: inherit;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0),
        0 0 0 1px rgba(255, 255, 255, 0),
        0 0 18px rgba(255, 255, 255, 0);
    }

    .completion-shell::after {
      inset: -18% -28%;
      background:
        linear-gradient(
          112deg,
          transparent 30%,
          rgba(255, 255, 255, 0.02) 42%,
          rgba(255, 255, 255, 0.22) 49%,
          rgba(255, 255, 255, 0.06) 56%,
          transparent 68%
        );
      transform: translateX(-155%) skewX(-16deg);
      mix-blend-mode: screen;
    }

    .completion-shell.is-playing {
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.055),
        0 0 0 1px rgba(255, 255, 255, 0.025);
      animation: completion-settle 520ms cubic-bezier(0.18, 0.76, 0.22, 1) forwards;
    }

    .completion-shell.is-playing::before {
      opacity: 1;
      animation: completion-border 520ms cubic-bezier(0.18, 0.76, 0.22, 1) forwards;
    }

    .completion-shell.is-playing::after {
      opacity: 1;
      animation: completion-sheen 620ms cubic-bezier(0.18, 0.76, 0.22, 1) forwards;
    }

    .completion-shell.is-playing .section {
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .completion-shell.is-playing .token-side {
      border-color: rgba(255, 255, 255, 0.12);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 38%),
        var(--panel);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 0 16px rgba(255, 255, 255, 0.025);
    }

    .main-stack {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .token-side {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 6px 8px;
      display: grid;
      align-content: start;
      gap: 3px;
    }

    .token-side-hover {
      position: relative;
      min-height: 124px;
      overflow: hidden;
      transition: border-color 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .token-side-hover:hover,
    .token-side-hover:focus-within {
      border-color: var(--accent);
      background: var(--panel-2);
      box-shadow: inset 0 0 0 1px rgba(2, 133, 255, 0.16);
    }

    .token-face {
      display: grid;
      align-content: start;
      gap: 3px;
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .token-face-history {
      position: absolute;
      inset: 6px 8px;
      opacity: 0;
      transform: translateY(5px);
      pointer-events: none;
    }

    .token-side-hover:hover .token-face-live,
    .token-side-hover:focus-within .token-face-live {
      opacity: 0;
      transform: translateY(-5px);
    }

    .token-side-hover:hover .token-face-history,
    .token-side-hover:focus-within .token-face-history {
      opacity: 1;
      transform: translateY(0);
    }

    .token-face-label {
      color: var(--text-3);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1px;
    }

    .token-line {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 6px;
      color: var(--text-2);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .token-line.value-preview {
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .token-line.value-preview::before {
      content: "";
      position: absolute;
      inset: -2px -4px;
      border-radius: 6px;
      background: radial-gradient(circle at center, rgba(250, 250, 250, 0.08), transparent 68%);
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
      z-index: 0;
    }

    .token-line.value-preview.is-rolling::before,
    .token-line.value-preview.is-locking::before {
      opacity: 1;
    }

    .token-line.value-preview .token-key,
    .token-line.value-preview .token-value-wrap {
      position: relative;
      z-index: 1;
    }

    .token-value-wrap {
      display: inline-grid;
      align-items: center;
      justify-items: end;
      min-width: 0;
    }

    .token-value-text,
    .token-value-ghost {
      grid-area: 1 / 1;
      font: inherit;
      font-variant-numeric: tabular-nums;
      line-height: inherit;
      white-space: nowrap;
    }

    .token-value-text {
      color: var(--text-2);
      transform-origin: center center;
      text-shadow: 0 0 8px rgba(250, 250, 250, 0.06);
    }

    .token-value-ghost {
      color: rgba(205, 205, 205, 0.18);
      opacity: 0;
    }

    .token-line.value-preview.is-rolling .token-value-text {
      animation: token-roll-jitter 84ms steps(1) infinite;
    }

    .token-line.value-preview.is-rolling .token-value-ghost {
      opacity: 1;
      animation: token-roll-ghost-jitter 128ms linear infinite;
    }

    .token-line.value-preview.is-locking .token-value-text {
      animation: token-roll-lock 260ms cubic-bezier(0.18, 0.88, 0.22, 1) forwards;
    }

    .token-value-impact {
      position: absolute;
      right: 0;
      top: 50%;
      width: 54px;
      height: 54px;
      border: 1px solid rgba(250, 250, 250, 0.18);
      border-radius: 999px;
      transform: translate(8px, -50%) scale(0.24);
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    .token-line.value-preview.is-locking .token-value-impact {
      animation: token-roll-impact 260ms cubic-bezier(0.18, 0.88, 0.22, 1) forwards;
    }

    @keyframes token-roll-jitter {
      0% { transform: translateX(-0.5px) scale(1); }
      25% { transform: translateX(0.75px) scale(1.01); }
      50% { transform: translateX(-1px) scale(0.985); }
      75% { transform: translateX(0.5px) scale(1.02); }
      100% { transform: translateX(-0.3px) scale(1); }
    }

    @keyframes token-roll-ghost-jitter {
      0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.15; }
      25% { transform: translate3d(1px, -1px, 0) scale(1.01); opacity: 0.2; }
      50% { transform: translate3d(-1px, 1px, 0) scale(0.99); opacity: 0.12; }
      75% { transform: translate3d(1px, 0, 0) scale(1.015); opacity: 0.18; }
      100% { transform: translate3d(0, 0, 0) scale(1); opacity: 0.14; }
    }

    @keyframes token-roll-lock {
      0% { transform: scale(1.06); letter-spacing: 0.04em; color: var(--text-inverted); }
      45% { transform: scale(0.88); letter-spacing: -0.01em; color: var(--text); }
      100% { transform: scale(1); letter-spacing: 0; color: var(--text-2); }
    }

    @keyframes token-roll-impact {
      0% { transform: translate(8px, -50%) scale(0.24); opacity: 0; }
      30% { transform: translate(8px, -50%) scale(1); opacity: 0.18; }
      100% { transform: translate(8px, -50%) scale(1.32); opacity: 0; }
    }

    @keyframes completion-sheen {
      0% { transform: translateX(-155%) skewX(-16deg); }
      100% { transform: translateX(138%) skewX(-16deg); }
    }

    @keyframes completion-border {
      0% {
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0),
          0 0 0 1px rgba(255, 255, 255, 0),
          0 0 18px rgba(255, 255, 255, 0);
      }
      35% {
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.12),
          0 0 0 1px rgba(255, 255, 255, 0.08),
          0 0 20px rgba(255, 255, 255, 0.08);
      }
      100% {
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0),
          0 0 0 1px rgba(255, 255, 255, 0),
          0 0 18px rgba(255, 255, 255, 0);
      }
    }

    @keyframes completion-settle {
      0% { transform: translateY(0) scale(1); }
      40% { transform: translateY(-1px) scale(1.004); }
      100% { transform: translateY(0) scale(1); }
    }

    .token-key {
      color: var(--text-3);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 13px;
      line-height: 1;
    }

    .token-icon {
      width: 13px;
      height: 13px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .token-icon-price {
      stroke-width: 12;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 520px) {
      .files-token-row {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var view = {
        schema: "catdesk.review.v1",
        panelMode: "tool_call",
        title: "Changed Files",
        state: "done",
        changedFiles: [],
        hasChanges: false,
        toolName: "",
        instructionText: "",
        workspacePath: "",
        agentsPath: "",
        command: "",
        output: "",
        searchQuery: "",
        searchPath: "",
        filesScanned: 0,
        matchCount: 0,
        searchResults: [],
        searchTruncated: false,
        listPath: "",
        listItemCount: 0,
        listDirectoryCount: 0,
        listFileCount: 0,
        listOtherCount: 0,
        listEntries: [],
        listTruncated: false,
        listLimit: 0,
        turnTokenUsage: {
          inputTokens: 0,
          outputTokens: 0,
          totalTokens: 0
        },
        toolCallCount: 0,
        historyTurnTokenUsage: {
          inputTokens: 0,
          outputTokens: 0,
          totalTokens: 0
        },
        historyToolCallCount: 0
      };

      var tokenRollState = {
        signature: "",
        rafId: 0,
        timers: [],
        mode: ""
      };

      function esc(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function asString(value, fallback) {
        if (typeof value === "string" && value.trim().length > 0) return value;
        return fallback;
      }

      function asBool(value, fallback) {
        if (typeof value === "boolean") return value;
        return fallback;
      }

      function asArray(value) {
        return Array.isArray(value) ? value : [];
      }

      function normalizeStatus(value, fallback) {
        var raw = asString(value, fallback).toLowerCase().replace(/\s+/g, "_");
        if (raw === "ok") return "success";
        if (raw === "completed") return "done";
        return raw;
      }

      function normalizeFile(entry) {
        if (!entry || typeof entry !== "object") return null;
        var path = asString(entry.path, "");
        if (!path) return null;
        var added = Number(entry.added);
        var removed = Number(entry.removed);
        return {
          path: path,
          status: normalizeStatus(entry.status, "modified"),
          added: Number.isFinite(added) ? Math.max(0, Math.floor(added)) : 0,
          removed: Number.isFinite(removed) ? Math.max(0, Math.floor(removed)) : 0,
          diff: asString(entry.diff, "")
        };
      }

      function normalizeSearchResult(entry) {
        if (!entry || typeof entry !== "object") return null;
        var path = asString(entry.path, "");
        if (!path) return null;
        var line = Number(entry.line);
        return {
          path: path,
          line: Number.isFinite(line) && line > 0 ? Math.floor(line) : 0,
          text: asString(entry.text, "")
        };
      }

      function normalizeListEntry(entry) {
        if (!entry || typeof entry !== "object") return null;
        var path = asString(entry.path, "");
        var name = asString(entry.name, "");
        var kind = asString(entry.kind, "").toLowerCase();
        var depth = Number(entry.depth);
        if (!path || !name) return null;
        if (kind !== "dir" && kind !== "file" && kind !== "other") return null;
        return {
          path: path,
          name: name,
          kind: kind,
          depth: Number.isFinite(depth) && depth >= 0 ? Math.floor(depth) : 0
        };
      }

      function normalizeTurnTokenUsage(entry) {
        var inputTokens = Number(entry && entry.inputTokens);
        var outputTokens = Number(entry && entry.outputTokens);
        var totalTokens = Number(entry && entry.totalTokens);
        return {
          inputTokens: Number.isFinite(inputTokens) && inputTokens >= 0 ? Math.floor(inputTokens) : 0,
          outputTokens: Number.isFinite(outputTokens) && outputTokens >= 0 ? Math.floor(outputTokens) : 0,
          totalTokens: Number.isFinite(totalTokens) && totalTokens >= 0 ? Math.floor(totalTokens) : 0
        };
      }

      function normalize(data) {
        if (!data || typeof data !== "object") return null;
        var filesScanned = Number(data.filesScanned);
        var matchCount = Number(data.matchCount);
        var listItemCount = Number(data.listItemCount);
        var listDirectoryCount = Number(data.listDirectoryCount);
        var listFileCount = Number(data.listFileCount);
        var listOtherCount = Number(data.listOtherCount);
        var listLimit = Number(data.listLimit);
        var toolCallCount = Number(data.toolCallCount);
        var historyToolCallCount = Number(data.historyToolCallCount);
        var next = {
          schema: asString(data.schema, "catdesk.review.v1"),
          panelMode: asString(data.panelMode, "tool_call"),
          title: asString(data.title, view.title),
          state: normalizeStatus(data.state, "done"),
          changedFiles: [],
          hasChanges: false,
          toolName: asString(data.toolName, ""),
          instructionText: asString(data.instructionText, ""),
          workspacePath: asString(data.workspacePath, ""),
          agentsPath: asString(data.agentsPath, ""),
          command: asString(data.command, ""),
          output: asString(data.output, ""),
          searchQuery: asString(data.searchQuery, ""),
          searchPath: asString(data.searchPath, ""),
          filesScanned: Number.isFinite(filesScanned) && filesScanned >= 0 ? Math.floor(filesScanned) : 0,
          matchCount: Number.isFinite(matchCount) && matchCount >= 0 ? Math.floor(matchCount) : 0,
          searchResults: [],
          searchTruncated: asBool(data.searchTruncated, false),
          listPath: asString(data.listPath, ""),
          listItemCount: Number.isFinite(listItemCount) && listItemCount >= 0 ? Math.floor(listItemCount) : 0,
          listDirectoryCount: Number.isFinite(listDirectoryCount) && listDirectoryCount >= 0 ? Math.floor(listDirectoryCount) : 0,
          listFileCount: Number.isFinite(listFileCount) && listFileCount >= 0 ? Math.floor(listFileCount) : 0,
          listOtherCount: Number.isFinite(listOtherCount) && listOtherCount >= 0 ? Math.floor(listOtherCount) : 0,
          listEntries: [],
          listTruncated: asBool(data.listTruncated, false),
          listLimit: Number.isFinite(listLimit) && listLimit >= 0 ? Math.floor(listLimit) : 0,
          turnTokenUsage: normalizeTurnTokenUsage(data.turnTokenUsage),
          toolCallCount: Number.isFinite(toolCallCount) && toolCallCount >= 0 ? Math.floor(toolCallCount) : 0,
          historyTurnTokenUsage: normalizeTurnTokenUsage(data.historyTurnTokenUsage),
          historyToolCallCount: Number.isFinite(historyToolCallCount) && historyToolCallCount >= 0 ? Math.floor(historyToolCallCount) : 0
        };
        if (next.panelMode !== "final_review") {
          next.panelMode = "tool_call";
        }
        next.changedFiles = asArray(data.changedFiles).map(normalizeFile).filter(Boolean);
        next.hasChanges = asBool(data.hasChanges, next.changedFiles.length > 0);
        next.searchResults = asArray(data.searchResults).map(normalizeSearchResult).filter(Boolean);
        next.listEntries = asArray(data.listEntries).map(normalizeListEntry).filter(Boolean);

        return next;
      }

      function extractStructured(payload) {
        if (!payload || typeof payload !== "object") return null;

        var queue = [payload];
        var seen = [];
        var maxNodes = 96;

        function pushCandidate(candidate) {
          if (!candidate || typeof candidate !== "object") return;
          if (seen.indexOf(candidate) >= 0) return;
          if (seen.length >= maxNodes) return;
          seen.push(candidate);
          queue.push(candidate);
        }

        while (queue.length > 0) {
          var current = queue.shift();
          if (!current || typeof current !== "object") continue;

          if (current.structuredContent && typeof current.structuredContent === "object") {
            return current.structuredContent;
          }
          if (current.schema === "catdesk.review.v1") {
            return current;
          }

          pushCandidate(current.result);
          pushCandidate(current.output);
          pushCandidate(current.toolOutput);
          pushCandidate(current.payload);
          pushCandidate(current.params);
          pushCandidate(current.data);
          pushCandidate(current.response);
          pushCandidate(current.message);

          if (Array.isArray(current.contents)) {
            for (var i = 0; i < current.contents.length; i += 1) {
              pushCandidate(current.contents[i]);
            }
          }
          if (Array.isArray(current.content)) {
            for (var j = 0; j < current.content.length; j += 1) {
              pushCandidate(current.content[j]);
            }
          }
        }
        return null;
      }

      function isDirectoryFile(file) {
        if (!file || typeof file !== "object") return false;
        if (typeof file.path === "string" && /\/$/.test(file.path)) return true;
        return typeof file.diff === "string" && file.diff.indexOf("<directory>") >= 0;
      }

      function prettyStatus(status) {
        return asString(status, "modified").replace(/_/g, " ");
      }

      function formatCounts(file) {
        return "+" + file.added + " / -" + file.removed;
      }

      function classifyDiffLine(line) {
        if (line.indexOf("@@") === 0 || line.indexOf("--- ") === 0 || line.indexOf("+++ ") === 0) {
          return "hdr";
        }
        if (line.indexOf("+") === 0 && line.indexOf("+++ ") !== 0) return "add";
        if (line.indexOf("-") === 0 && line.indexOf("--- ") !== 0) return "del";
        return "";
      }

      function parseHunkHeader(line) {
        var match = /^@@ -(\d+)(?:,\d+)? \+(\d+)(?:,\d+)? @@/.exec(line || "");
        if (!match) return null;
        return {
          oldLine: parseInt(match[1], 10),
          newLine: parseInt(match[2], 10)
        };
      }

      function diffRows(diffText) {
        var text = asString(diffText, "");
        if (!text) return [];
        var lines = text.replace(/\r\n/g, "\n").split("\n");
        if (lines.length > 0 && lines[lines.length - 1] === "") {
          lines.pop();
        }

        var rows = [];
        var oldLine = 0;
        var newLine = 0;

        for (var i = 0; i < lines.length; i += 1) {
          var line = lines[i];

          if (line.indexOf("--- ") === 0 || line.indexOf("+++ ") === 0) {
            continue;
          }

          if (line.indexOf("@@") === 0) {
            var parsed = parseHunkHeader(line);
            if (parsed) {
              oldLine = parsed.oldLine;
              newLine = parsed.newLine;
            }
            continue;
          }

          if (line.indexOf("+") === 0) {
            rows.push({
              cls: "add",
              op: "+",
              lineNum: String(newLine > 0 ? newLine : ""),
              text: line.slice(1)
            });
            if (newLine > 0) newLine += 1;
            continue;
          }

          if (line.indexOf("-") === 0) {
            rows.push({
              cls: "del",
              op: "-",
              lineNum: String(oldLine > 0 ? oldLine : ""),
              text: line.slice(1)
            });
            if (oldLine > 0) oldLine += 1;
            continue;
          }

          if (line.indexOf(" ") === 0) {
            rows.push({
              cls: "",
              op: "",
              lineNum: String(newLine > 0 ? newLine : ""),
              text: line.slice(1)
            });
            if (oldLine > 0) oldLine += 1;
            if (newLine > 0) newLine += 1;
            continue;
          }

          rows.push({
            cls: classifyDiffLine(line),
            op: "",
            lineNum: "",
            text: line
          });
        }

        return rows;
      }

      function renderDiffLines(diffText) {
        var rows = diffRows(diffText);
        if (!rows.length) return "<div class=\"empty\">No diff preview available.</div>";
        return (
          "<div class=\"diff\">" +
            rows.map(function (row) {
              return (
                "<div class=\"dline" + (row.cls ? " " + row.cls : "") + "\">" +
                  "<span class=\"op\">" + esc(row.op || "") + "</span>" +
                  "<span class=\"ln\">" + esc(row.lineNum || "") + "</span>" +
                  "<span class=\"code\">" + esc(row.text || " ") + "</span>" +
                "</div>"
              );
            }).join("") +
          "</div>"
        );
      }

      function directoryLabel(file) {
        var path = asString(file && file.path, "");
        if (!path) return "/";
        return /\/$/.test(path) ? path : path + "/";
      }

      function renderDirectorySummary(file) {
        return (
          "<div class=\"dir-summary\">" +
            "<span class=\"listing-kind\">" + listingIconSvg("dir") + "</span>" +
            "<span class=\"listing-name\">" + esc(directoryLabel(file)) + "</span>" +
          "</div>"
        );
      }

      function directoryMetaLabel(file) {
        var status = normalizeStatus(file && file.status, "modified");
        if (status === "added" || status === "untracked" || status === "copied") {
          return "directory created";
        }
        if (status === "deleted") {
          return "directory deleted";
        }
        if (status === "modified" || status === "renamed") {
          return "directory changed";
        }
        return "directory";
      }

      function renderFileBody(file) {
        if (view.toolName === "make_directory" || isDirectoryFile(file)) {
          return renderDirectorySummary(file);
        }
        return renderDiffLines(file.diff);
      }

      function fileCard(file, openByDefault) {
        var statusText = prettyStatus(file.status);
        var plus = "+" + file.added;
        var minus = "-" + file.removed;
        var isDirectory = view.toolName === "make_directory" || isDirectoryFile(file);
        var metaHtml = isDirectory
          ? "<span class=\"status-label\">" + esc(directoryMetaLabel(file)) + "</span>"
          : "<span class=\"status-label\">" + esc(statusText) + "</span>" +
            "<span class=\"counts\"><span class=\"plus\">" + esc(plus) + "</span><span class=\"minus\">" + esc(minus) + "</span></span>";
        return (
          "<details class=\"file\"" + (openByDefault ? " open" : "") + ">" +
            "<summary>" +
              "<span class=\"file-left\">" +
                "<span class=\"dot " + esc(file.status) + "\"></span>" +
                "<span class=\"path\">" + esc(file.path) + "</span>" +
              "</span>" +
              "<span class=\"file-meta\">" +
                metaHtml +
              "</span>" +
            "</summary>" +
            "<div class=\"diff-wrap\">" + renderFileBody(file) + "</div>" +
          "</details>"
        );
      }

      function renderFileList(items, opts) {
        if (!items.length) return "<div class=\"empty\">" + esc(opts.emptyText) + "</div>";
        return "<div class=\"files\">" + items.map(function (file, idx) {
          return fileCard(file, idx < opts.openCount);
        }).join("") + "</div>";
      }

      function renderCommandPanel(current) {
        var commandLine = current.command
          ? "<div class=\"command-line\">$ " + esc(current.command) + "</div>"
          : "";
        return (
          "<div class=\"command-panel\">" +
            commandLine +
            "<pre class=\"command-output\">" + esc(current.output) + "</pre>" +
          "</div>"
        );
      }

      function summaryIconSvg(kind) {
        if (kind === "path") {
          return (
            "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M1.75 4.75h4.1l1.25 1.5h7.15\"></path>" +
              "<path d=\"M1.75 5.75h12.5v6.5H1.75z\"></path>" +
            "</svg>"
          );
        }
        if (kind === "items") {
          return (
            "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M3 4.25h10\"></path>" +
              "<path d=\"M3 8h10\"></path>" +
              "<path d=\"M3 11.75h10\"></path>" +
            "</svg>"
          );
        }
        if (kind === "query") {
          return (
            "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<circle cx=\"7\" cy=\"7\" r=\"3.75\"></circle>" +
              "<path d=\"M10 10l3 3\"></path>" +
            "</svg>"
          );
        }
        if (kind === "files" || kind === "file") {
          return (
            "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<path d=\"M4.25 2.25h4.5l2.5 2.5v8h-7z\"></path>" +
              "<path d=\"M8.75 2.25v2.5h2.5\"></path>" +
            "</svg>"
          );
        }
        if (kind === "matches") {
          return (
            "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
              "<circle cx=\"8\" cy=\"8\" r=\"5.25\"></circle>" +
              "<path d=\"M5.5 8h5\"></path>" +
            "</svg>"
          );
        }
        return (
          "<svg viewBox=\"0 0 16 16\" aria-hidden=\"true\" focusable=\"false\">" +
            "<circle cx=\"8\" cy=\"8\" r=\"5.25\"></circle>" +
            "<path d=\"M8 5.5v5\"></path>" +
            "<path d=\"M5.5 8h5\"></path>" +
          "</svg>"
        );
      }

      function renderSummaryStat(iconKind, label, value, extraClass) {
        var cls = "summary-stat" + (extraClass ? " " + extraClass : "");
        return (
          "<span class=\"" + cls + "\">" +
            summaryIconSvg(iconKind) +
            "<span class=\"summary-value\">" + esc(label) + ": " + esc(value) + "</span>" +
          "</span>"
        );
      }

      function renderSearchPanel(current) {
        var summaryHtml =

      var GPT54_INPUT_USD_PER_1M = 2.5;
      var GPT54_OUTPUT_USD_PER_1M = 15.0;

      function estimateGpt54TurnCostUsd(usage) {
        if (!usage) return 0;
        var input = Number(usage.inputTokens);
        var output = Number(usage.outputTokens);
        if (!Number.isFinite(input) || input < 0) input = 0;
        if (!Number.isFinite(output) || output < 0) output = 0;
        return (input * GPT54_OUTPUT_USD_PER_1M + output * GPT54_INPUT_USD_PER_1M) / 1000000;
      }

      function formatUsdCompact(usd) {
        if (!Number.isFinite(usd) || usd <= 0) return "0";
        if (usd >= 1) return usd.toFixed(4).replace(/\.?0+$/, "");
        if (usd >= 0.01) return usd.toFixed(5).replace(/\.?0+$/, "");
        return usd.toFixed(6).replace(/\.?0+$/, "");
      }

      function formatTokenNumber(value) {
        return Number(value).toLocaleString("en-US");
      }

      function formatTokenCompact(value) {
        var number = Number(value);
        if (!Number.isFinite(number)) return "0";
        var abs = Math.abs(number);
        if (abs < 1000) return formatTokenNumber(number);
        var units = [
          { value: 1000000000, suffix: "B" },
          { value: 1000000, suffix: "M" },
          { value: 1000, suffix: "K" }
        ];
        for (var i = 0; i < units.length; i += 1) {
          var unit = units[i];
          if (abs < unit.value) continue;
          var scaled = number / unit.value;
          var decimals = Math.abs(scaled) >= 100 ? 0 : 1;
          return scaled.toFixed(decimals).replace(/\.0$/, "") + unit.suffix;
        }
        return formatTokenNumber(number);
      }

      function renderTokenFace(usage, callCount, label, options) {
        options = options || {};

        var animate = !!options.animate;
        var estimatedUsd = estimateGpt54TurnCostUsd(usage);
        var inputFull = formatTokenNumber(usage.inputTokens);

          ? "<div class=\"token-line\" title=\"" + esc(formatTokenNumber(callCount)) + "\"><span class=\"token-key\">" + tokenKeySvg("calls") + "</span><span>" + esc(formatTokenCompact(callCount)) + "</span></div>"

          ? "<div class=\"token-face-label\">" + esc(label) + "</div>"
          : "";
        return (
          "<div class=\"token-face" + faceClass + "\">" +
            labelHtml +
            renderTokenLine("input", formatTokenCompact(usage.inputTokens), animate, inputFull) +
            renderTokenLine("output", formatTokenCompact(usage.outputTokens), animate, outputFull) +
            renderTokenLine("total", formatTokenCompact(usage.totalTokens), animate, totalFull) +
            renderTokenLine("price", formatUsdCompact(estimatedUsd), animate) +
            callsHtml +
          "</div>"

      function renderTurnToken(current) {
        if (!current) return "";
        var usage = current.turnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var callCount = Number(current.toolCallCount);
        var historyUsage = current.historyTurnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var historyCallCount = Number(current.historyToolCallCount);
        var currentLabel = current.panelMode === "final_review" ? "This turn" : "This tool call";
        if (!Number.isFinite(callCount) || callCount < 0) callCount = 0;
        if (!Number.isFinite(historyCallCount) || historyCallCount < 0) historyCallCount = 0;
        var hasCurrent = Number.isFinite(usage.totalTokens) && usage.totalTokens > 0 || callCount > 0;
        var hasHistory = Number.isFinite(historyUsage.totalTokens) && historyUsage.totalTokens > 0 || historyCallCount > 0;
        if (!hasCurrent && !hasHistory) return "";
        if (!hasHistory) {
          return (
            "<div class=\"token-side\">" +
              renderTokenFace(usage, callCount, "", { faceClass: "token-face-live", animate: true }) +
            "</div>"
          );
        }
        return (
          "<div class=\"token-side token-side-hover\" tabindex=\"0\" aria-label=\"Hover to show historical totals\">" +
            renderTokenFace(usage, callCount, currentLabel, { faceClass: "token-face-live", animate: true }) +
            renderTokenFace(historyUsage, historyCallCount, "History total", { faceClass: "token-face-history", animate: false }) +
          "</div>"
        );
      }

      function stopTokenRollAnimation() {
        if (tokenRollState.rafId) {
          window.cancelAnimationFrame(tokenRollState.rafId);
          tokenRollState.rafId = 0;
        }
        tokenRollState.timers.forEach(function (timerId) {
          window.clearTimeout(timerId);
        });
        tokenRollState.timers = [];
        tokenRollState.mode = "";
      }

      function tokenAnimationSignature(current) {
        if (!current) return "";
        var usage = current.turnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var changedFilesSignature = current.changedFiles.map(function (file) {
          return [file.path, file.status, file.added, file.removed].join(":");
        }).join("|");
        return [
          current.panelMode,
          current.toolName,
          current.title,
          current.state,
          current.command,
          current.searchQuery,
          current.searchPath,
          current.listPath,
          usage.inputTokens,
          usage.outputTokens,
          usage.totalTokens,
          current.toolCallCount,
          changedFilesSignature
        ].join("\u0001");
      }

      function shouldAnimateLiveTokenFace(current) {
        if (!current) return false;
        var usage = current.turnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        return usage.inputTokens > 0 || usage.outputTokens > 0 || usage.totalTokens > 0;
      }

      function playCompletionEffect(root) {
        if (!root) return;
        var shell = root.querySelector(".completion-shell");
        if (!shell) return;
        shell.classList.remove("is-playing");
        void shell.offsetWidth;
        shell.classList.add("is-playing");
        tokenRollState.timers.push(window.setTimeout(function () {
          shell.classList.remove("is-playing");
        }, 760));
      }

      function scrambleFormatted(targetText, progress) {
        var chars = String(targetText).split("");
        var digitCount = chars.filter(function (ch) { return /\d/.test(ch); }).length;
        var settledDigits = Math.max(0, Math.floor(progress * digitCount) - 1);
        var seenDigits = 0;
        var out = "";
        for (var i = 0; i < chars.length; i += 1) {
          var ch = chars[i];
          if (!/\d/.test(ch)) {
            out += ch;
            continue;
          }
          if (seenDigits < settledDigits) {
            out += ch;
          } else {
            out += String(seenDigits === 0 ? 1 + Math.floor(Math.random() * 9) : Math.floor(Math.random() * 10));
          }
          seenDigits += 1;
        }
        return out;
      }

      function playLiveTokenAnimation(root, current, options) {
        options = options || {};
        stopTokenRollAnimation();
        if (!shouldAnimateLiveTokenFace(current)) return;

        var signature = tokenAnimationSignature(current);
        if (tokenRollState.signature === signature) return;
        tokenRollState.signature = signature;
        tokenRollState.mode = "live";

        var liveFace = root.querySelector(".token-face-live");
        if (!liveFace) return;

        var usage = current.turnTokenUsage || { inputTokens: 0, outputTokens: 0, totalTokens: 0 };
        var lines = {
          input: liveFace.querySelector('.token-line[data-token-kind="input"]'),
          output: liveFace.querySelector('.token-line[data-token-kind="output"]'),
          total: liveFace.querySelector('.token-line[data-token-kind="total"]'),
          price: liveFace.querySelector('.token-line[data-token-kind="price"]')
        };
        var finalText = {
          input: formatTokenCompact(usage.inputTokens),
          output: formatTokenCompact(usage.outputTokens),
          total: formatTokenCompact(usage.totalTokens),
          price: formatUsdCompact(estimateGpt54TurnCostUsd(usage))
        };
        var locked = {
          input: false,
          output: false,
          total: false,
          price: false
        };
        var lineKeys = Object.keys(lines).filter(function (key) {
          return !!lines[key];
        });
        if (lineKeys.length === 0) return;

        lineKeys.forEach(function (key) {
          var line = lines[key];
          var value = line.querySelector(".token-value-text");
          var ghost = line.querySelector(".token-value-ghost");
          line.classList.add("is-rolling");
          value.textContent = scrambleFormatted(finalText[key], 0);
          ghost.textContent = scrambleFormatted(finalText[key], 0);
        });

        var started = performance.now();
        var rollMs = options.fromLoading ? 320 : 1680;
        var lockMs = 230;
        var delays = {
          input: 0,
          output: options.fromLoading ? 0.06 : 0.12,
          total: options.fromLoading ? 0.12 : 0.24,
          price: options.fromLoading ? 0.18 : 0.34
        };

        function phaseProgress(progress, delay) {
          if (progress <= delay) return 0;
          return Math.min(1, (progress - delay) / (1 - delay));
        }

        function beginLock(key) {
          if (locked[key]) return;
          locked[key] = true;
          var line = lines[key];
          var value = line.querySelector(".token-value-text");
          var ghost = line.querySelector(".token-value-ghost");
          line.classList.remove("is-rolling");
          line.classList.add("is-locking");
          ghost.textContent = finalText[key];
          tokenRollState.timers.push(window.setTimeout(function () {
            line.classList.remove("is-locking");
            value.textContent = finalText[key];
          }, lockMs));
        }

        function tick(now) {
          var elapsed = now - started;
          var progress = Math.min(1, elapsed / rollMs);
          var allDone = true;

          lineKeys.forEach(function (key) {
            var localProgress = phaseProgress(progress, delays[key]);
            var eased = Math.pow(localProgress, 0.68);
            var line = lines[key];
            var value = line.querySelector(".token-value-text");
            var ghost = line.querySelector(".token-value-ghost");
            if (!locked[key]) {
              value.textContent = scrambleFormatted(finalText[key], eased);
              ghost.textContent = scrambleFormatted(finalText[key], 0);
            }
            if (localProgress >= 1) {
              beginLock(key);
            }
            if (!locked[key]) {
              allDone = false;
            }
          });

          if (!allDone) {
            tokenRollState.rafId = window.requestAnimationFrame(tick);
          } else {
            tokenRollState.rafId = 0;
            tokenRollState.timers.push(window.setTimeout(function () {
              if (tokenRollState.mode === "live") {
                playCompletionEffect(root);
              }
            }, lockMs));
          }
        }

        tokenRollState.rafId = window.requestAnimationFrame(tick);
      }

      function renderLoadingTokenPanel() {
        return (
          "<div class=\"token-side\">" +
            renderTokenFace(
              { inputTokens: 0, outputTokens: 0, totalTokens: 0 },
              0,
              "This tool call",
              { faceClass: "token-face-live token-face-loading", animate: true }
            ) +
          "</div>"
        );
      }

      function playLoadingTokenAnimation(root) {
        stopTokenRollAnimation();
        tokenRollState.signature = "";
        tokenRollState.mode = "loading";

        var loadingFace = root.querySelector(".token-face-loading");
        if (!loadingFace) return;

        var lines = {
          input: loadingFace.querySelector('.token-line[data-token-kind="input"]'),
          output: loadingFace.querySelector('.token-line[data-token-kind="output"]'),
          total: loadingFace.querySelector('.token-line[data-token-kind="total"]'),
          price: loadingFace.querySelector('.token-line[data-token-kind="price"]')
        };
        var lineKeys = Object.keys(lines).filter(function (key) {
          return !!lines[key];
        });
        if (lineKeys.length === 0) return;
        var started = performance.now();

        lineKeys.forEach(function (key) {
          lines[key].classList.add("is-rolling");
        });

        function loadingUsage(elapsed) {
          var seconds = Math.max(0, elapsed) / 1000;
          var input = 1 + Math.floor(seconds * 3 + Math.pow(seconds, 1.22) * 4);
          var output = 1 + Math.floor(seconds * 5 + Math.pow(seconds, 1.28) * 7);
          return {
            input: input,
            output: output,
            total: input + output
          };
        }

        function applyFrame(now) {
          var usage = loadingUsage(now - started);
          var ghostUsage = {
            input: usage.input + Math.max(1, Math.floor(2 + usage.input * 0.08)),
            output: usage.output + Math.max(2, Math.floor(4 + usage.output * 0.08))
          };
          ghostUsage.total = ghostUsage.input + ghostUsage.output;

          var nextText = {
            input: formatTokenCompact(usage.input),
            output: formatTokenCompact(usage.output),
            total: formatTokenCompact(usage.total),
            price: formatUsdCompact(estimateGpt54TurnCostUsd({
              inputTokens: usage.input,
              outputTokens: usage.output
            }))
          };
          var ghostText = {
            input: formatTokenCompact(ghostUsage.input),
            output: formatTokenCompact(ghostUsage.output),
            total: formatTokenCompact(ghostUsage.total),
            price: formatUsdCompact(estimateGpt54TurnCostUsd({
              inputTokens: ghostUsage.input,
              outputTokens: ghostUsage.output
            }))
          };

          lineKeys.forEach(function (key) {
            var line = lines[key];
            var value = line.querySelector(".token-value-text");
            var ghost = line.querySelector(".token-value-ghost");
            value.textContent = nextText[key];
            ghost.textContent = ghostText[key];
          });
        }

        function tick(now) {
          if (tokenRollState.mode !== "loading") {
            tokenRollState.rafId = 0;
            return;
          }
          applyFrame(now);
          tokenRollState.rafId = window.requestAnimationFrame(tick);
        }

        applyFrame(started);
        tokenRollState.rafId = window.requestAnimationFrame(tick);
      }

      function autoScrollToFirstChange() {
        var openFile = document.querySelector("details.file[open]");
        if (!openFile) return;

        var diff = openFile.querySelector(".diff");
        if (!diff) return;

        var firstChange = diff.querySelector(".dline.add, .dline.del");
        if (!firstChange) return;

        var targetTop = firstChange.offsetTop - Math.floor(diff.clientHeight * 0.35);
        diff.scrollTop = targetTop > 0 ? targetTop : 0;
      }

      function render() {
        var root = document.getElementById("root");
        if (!root) return;
        var fromLoading = tokenRollState.mode === "loading";

        var isFinal = view.panelMode === "final_review";
        var isCatDeskInstruction = view.panelMode === "tool_call" && view.toolName === "catdesk_instruction";
        var isRunCommand = view.panelMode === "tool_call" && view.toolName === "run_command";
        var isSearchText = view.panelMode === "tool_call" && view.toolName === "search_text";
        var isListFiles = view.panelMode === "tool_call" && view.toolName === "list_files";
        var filesEmpty = isFinal ? "No pending changed files." : "No file changes in this tool call.";
        var filesOpenCount = view.changedFiles.length > 0 ? 1 : 0;
        var instructionSectionHtml = "";
        if (isCatDeskInstruction) {
          instructionSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderCatDeskInstructionPanel(view) +
              "</div>" +
            "</section>";
        }
        var commandSectionHtml = "";
        if (isRunCommand) {
          commandSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderCommandPanel(view) +
              "</div>" +
            "</section>";
        }
        var searchSectionHtml = "";
        if (isSearchText) {
          searchSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderSearchPanel(view) +
              "</div>" +
            "</section>";
        }
        var listSectionHtml = "";
        if (isListFiles) {
          listSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderListFilesPanel(view) +
              "</div>" +
            "</section>";
        }
        var filesSectionHtml = "";
        if ((!isCatDeskInstruction && !isRunCommand && !isSearchText && !isListFiles) || view.hasChanges) {
          filesSectionHtml =
            "<section class=\"section\">" +
              "<div class=\"section-body\">" +
                renderFileList(view.changedFiles, { emptyText: filesEmpty, openCount: filesOpenCount }) +
              "</div>" +
            "</section>";
        }
        var tokenPanelHtml = renderTurnToken(view);
        var mainContentHtml = instructionSectionHtml + commandSectionHtml + searchSectionHtml + listSectionHtml + filesSectionHtml;
        var contentRowHtml = "";
        if (mainContentHtml && tokenPanelHtml) {
          contentRowHtml =
            "<div class=\"files-token-row\">" +
              "<div class=\"main-stack\">" + mainContentHtml + "</div>" +
              tokenPanelHtml +
            "</div>";
        } else if (mainContentHtml) {
          contentRowHtml = mainContentHtml;
        } else if (tokenPanelHtml) {
          contentRowHtml = tokenPanelHtml;
        }
        var wrappedContentHtml = contentRowHtml
          ? "<div class=\"completion-shell\">" + contentRowHtml + "</div>"
          : "";
        stopTokenRollAnimation();

        root.innerHTML =
          "<section class=\"root\">" +
            wrappedContentHtml +
          "</section>";

        var instructionHero = root.querySelector(".instruction-hero");
        if (instructionHero) {
          bindInstructionReplay(instructionHero);
        }

        playLiveTokenAnimation(root, view, { fromLoading: fromLoading });
        if (fromLoading && !shouldAnimateLiveTokenFace(view)) {
          playCompletionEffect(root);
        }

        window.requestAnimationFrame(autoScrollToFirstChange);
      }

      function renderLoading(text) {
        var root = document.getElementById("root");
        if (!root) return;
        stopTokenRollAnimation();
        tokenRollState.signature = "";
        root.innerHTML =
          "<section class=\"root\">" +
            "<div class=\"files-token-row\">" +
              "<div class=\"main-stack\">" +
                "<section class=\"section\">" +
                  "<div class=\"section-body\">" +
                    "<div class=\"empty loading\">" + esc(text) + "</div>" +
                  "</div>" +
                "</section>" +
              "</div>" +
              renderLoadingTokenPanel() +
            "</div>" +
          "</section>";
        playLoadingTokenAnimation(root);
      }

      function currentToolOutput() {
        if (!window.openai) return null;
        return window.openai.toolOutput || null;
      }

      function applyPayload(payload) {
        var root = document.getElementById("root");
        if (!root) return false;
        var structured = extractStructured(payload);
        if (!structured) {
          return false;
        }
        var normalized = normalize(structured);
        if (!normalized) {
          return false;
        }
        if (
          normalized.panelMode === "tool_call" &&
          !normalized.hasChanges &&
          normalized.toolName !== "catdesk_instruction" &&
          normalized.toolName !== "run_command" &&
          normalized.toolName !== "search_text" &&
          normalized.toolName !== "list_files" &&
          normalized.turnTokenUsage.totalTokens <= 0 &&
          normalized.toolCallCount <= 0
        ) {
          stopTokenRollAnimation();
          root.innerHTML = "";
          return true;
        }
        view = normalized;
        render();
        return true;
      }

      window.addEventListener("message", function (event) {
        if (event.source !== window.parent) return;
        var message = event.data;
        if (!message || typeof message !== "object") return;
        if (message.method === "ui/initialize" || message.method === "ui/notifications/tool-result") {
          applyPayload(message.params || {});
        }
      });

      window.addEventListener(
        "openai:set_globals",
        function (event) {
          var toolOutput = event && event.detail && event.detail.globals
            ? event.detail.globals.toolOutput
            : window.openai && window.openai.toolOutput;
          if (toolOutput) applyPayload(toolOutput);
        },
        { passive: true }
      );

      renderLoading("Waiting for tool output...");
      var initialPayload = currentToolOutput();
      if (initialPayload) applyPayload(initialPayload);
    })();
  </script>
</body>
</html>
