        function renderTokenFace(usage, callCount, label, options) {
          options = options || {};
          var faceClass = options.faceClass ? " " + options.faceClass : "";
          var animate = !!options.animate;
          var estimatedUsd = estimateGpt54TurnCostUsd(usage);
          var inputFull = formatTokenNumber(usage.inputTokens);
          var outputFull = formatTokenNumber(usage.outputTokens);
          var totalFull = formatTokenNumber(usage.totalTokens);
          var callsHtml =
            callCount > 0
              ? '<div class="token-line" title="' +
                esc(formatTokenNumber(callCount)) +
                '"><span class="token-key">' +
                tokenKeySvg("calls") +
                "</span><span>" +
                esc(formatTokenCompact(callCount)) +
                "</span></div>"
              : "";
          var priceText = animate
            ? formatUsdAnimated(estimatedUsd)
            : formatUsdCompact(estimatedUsd);
          var labelHtml = label
            ? '<div class="token-face-label">' + esc(label) + "</div>"
            : "";
          return (
            '<div class="token-face' +
            faceClass +
            '">' +
            labelHtml +
            renderTokenLine(
              "input",
              formatTokenCompact(usage.inputTokens),
              animate,
              inputFull,
            ) +
            renderTokenLine(
              "output",
              formatTokenCompact(usage.outputTokens),
              animate,
              outputFull,
            ) +
            renderTokenLine(
              "total",
              formatTokenCompact(usage.totalTokens),
              animate,
              totalFull,
            ) +
            renderTokenLine("price", priceText, animate) +
            callsHtml +
            "</div>"
          );
        }

        function renderTurnToken(current) {
          if (!current) return "";
          var usage = current.turnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var callCount = Number(current.toolCallCount);
          var historyUsage = current.historyTurnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var historyCallCount = Number(current.historyToolCallCount);
          var currentLabel =
            current.panelMode === "final_review"
              ? "This turn"
              : "This tool call";
          if (!Number.isFinite(callCount) || callCount < 0) callCount = 0;
          if (!Number.isFinite(historyCallCount) || historyCallCount < 0)
            historyCallCount = 0;
          var hasCurrent =
            (Number.isFinite(usage.totalTokens) && usage.totalTokens > 0) ||
            callCount > 0;
          var hasHistory =
            (Number.isFinite(historyUsage.totalTokens) &&
              historyUsage.totalTokens > 0) ||
            historyCallCount > 0;
          if (!hasCurrent && !hasHistory) return "";
          if (!hasHistory) {
            return (
              '<div class="token-side">' +
              renderTokenFace(usage, callCount, "", {
                faceClass: "token-face-live",
                animate: true,
              }) +
              "</div>"
            );
          }
          return (
            '<div class="token-side token-side-hover" tabindex="0" aria-label="Hover to show historical totals">' +
            renderTokenFace(usage, callCount, currentLabel, {
              faceClass: "token-face-live",
              animate: true,
            }) +
            renderTokenFace(historyUsage, historyCallCount, "History total", {
              faceClass: "token-face-history",
              animate: false,
            }) +
            "</div>"
          );
        }

        function renderToolDetailPanel(current) {
          if (!current || (!current.call && !current.detail)) return "";
          var callHtml = current.call
            ? '<div class="command-line">' + esc(current.call) + "</div>"
            : "";
          var detailHtml = current.detail
            ? '<pre class="command-output">' + esc(current.detail) + "</pre>"
            : "";
          return '<div class="command-panel">' + callHtml + detailHtml + "</div>";
        }

        function stopTokenRollAnimation() {
          if (tokenRollState.rafId) {
            window.cancelAnimationFrame(tokenRollState.rafId);
            tokenRollState.rafId = 0;
          }
          tokenRollState.timers.forEach(function (timerId) {
            window.clearTimeout(timerId);
          });
          tokenRollState.timers = [];
          tokenRollState.mode = "";
        }

        function tokenAnimationSignature(current) {
          if (!current) return "";
          var usage = current.turnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var changedFilesSignature = current.changedFiles
            .map(function (file) {
              return [file.path, file.status, file.added, file.removed].join(
                ":",
              );
            })
            .join("|");
          return [
            current.panelMode,
            current.toolName,
            current.title,
            current.state,
            current.command,
            current.searchQuery,
            current.searchPath,
            current.listPath,
            usage.inputTokens,
            usage.outputTokens,
            usage.totalTokens,
            current.toolCallCount,
            changedFilesSignature,
          ].join("\u0001");
        }

        function shouldAnimateLiveTokenFace(current) {
          if (!current) return false;
          var usage = current.turnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          return (
            usage.inputTokens > 0 ||
            usage.outputTokens > 0 ||
            usage.totalTokens > 0
          );
        }

        function playCompletionEffect(root) {
          if (!root) return;
          var shell = root.querySelector(".completion-shell");
          if (!shell) return;
          shell.classList.remove("is-playing");
          void shell.offsetWidth;
          shell.classList.add("is-playing");
          tokenRollState.timers.push(
            window.setTimeout(function () {
              shell.classList.remove("is-playing");
            }, 760),
          );
        }

        function scrambleFormatted(targetText, progress) {
          var chars = String(targetText).split("");
          var digitCount = chars.filter(function (ch) {
            return /\d/.test(ch);
          }).length;
          var settledDigits = Math.max(
            0,
            Math.floor(progress * digitCount) - 1,
          );
          var seenDigits = 0;
          var out = "";
          for (var i = 0; i < chars.length; i += 1) {
            var ch = chars[i];
            if (!/\d/.test(ch)) {
              out += ch;
              continue;
            }
            if (seenDigits < settledDigits) {
              out += ch;
            } else {
              out += String(
                seenDigits === 0
                  ? 1 + Math.floor(Math.random() * 9)
                  : Math.floor(Math.random() * 10),
              );
            }
            seenDigits += 1;
          }
          return out;
        }

        function playLiveTokenAnimation(root, current, options) {
          options = options || {};
          stopTokenRollAnimation();
          if (!shouldAnimateLiveTokenFace(current)) return;

          var signature = tokenAnimationSignature(current);
          if (tokenRollState.signature === signature) return;
          tokenRollState.signature = signature;
          tokenRollState.mode = "live";

          var liveFace = root.querySelector(".token-face-live");
          if (!liveFace) return;

          var usage = current.turnTokenUsage || {
            inputTokens: 0,
            outputTokens: 0,
            totalTokens: 0,
          };
          var lines = {
            input: liveFace.querySelector(
              '.token-line[data-token-kind="input"]',
            ),
            output: liveFace.querySelector(
              '.token-line[data-token-kind="output"]',
            ),
            total: liveFace.querySelector(
              '.token-line[data-token-kind="total"]',
            ),
            price: liveFace.querySelector(
              '.token-line[data-token-kind="price"]',
            ),
          };
          var finalText = {
            input: formatTokenCompact(usage.inputTokens),
            output: formatTokenCompact(usage.outputTokens),
            total: formatTokenCompact(usage.totalTokens),
            price: formatUsdCompact(estimateGpt54TurnCostUsd(usage)),
          };
          var animatedText = {
            input: finalText.input,
            output: finalText.output,
            total: finalText.total,
            price: formatUsdAnimated(estimateGpt54TurnCostUsd(usage)),
          };
          var locked = {
            input: false,
            output: false,
            total: false,
            price: false,
          };
          var lineKeys = Object.keys(lines).filter(function (key) {
            return !!lines[key];
          });
          if (lineKeys.length === 0) return;

          lineKeys.forEach(function (key) {
            var line = lines[key];
            var value = line.querySelector(".token-value-text");
            var ghost = line.querySelector(".token-value-ghost");
            line.classList.add("is-rolling");
            value.textContent = scrambleFormatted(animatedText[key], 0);
            ghost.textContent = scrambleFormatted(animatedText[key], 0);
          });

          var started = performance.now();
          var rollMs = options.fromLoading ? 320 : 1680;
          var lockMs = 230;
          var delays = {
            input: 0,
            output: options.fromLoading ? 0.06 : 0.12,
            total: options.fromLoading ? 0.12 : 0.24,
            price: options.fromLoading ? 0.18 : 0.34,
          };

          function phaseProgress(progress, delay) {
            if (progress <= delay) return 0;
            return Math.min(1, (progress - delay) / (1 - delay));
          }

          function beginLock(key) {
            if (locked[key]) return;
            locked[key] = true;
            var line = lines[key];
            var value = line.querySelector(".token-value-text");
            var ghost = line.querySelector(".token-value-ghost");
            line.classList.remove("is-rolling");
            line.classList.add("is-locking");
            ghost.textContent = finalText[key];
            tokenRollState.timers.push(
              window.setTimeout(function () {
                line.classList.remove("is-locking");
                value.textContent = finalText[key];
              }, lockMs),
            );
          }

          function tick(now) {
            var elapsed = now - started;
            var progress = Math.min(1, elapsed / rollMs);
            var allDone = true;

            lineKeys.forEach(function (key) {
              var localProgress = phaseProgress(progress, delays[key]);
              var eased = Math.pow(localProgress, 0.68);
              var line = lines[key];
              var value = line.querySelector(".token-value-text");
              var ghost = line.querySelector(".token-value-ghost");
              if (!locked[key]) {
                value.textContent = scrambleFormatted(animatedText[key], eased);
                ghost.textContent = scrambleFormatted(animatedText[key], 0);
              }
              if (localProgress >= 1) {
                beginLock(key);
              }
              if (!locked[key]) {
                allDone = false;
              }
            });

            if (!allDone) {
              tokenRollState.rafId = window.requestAnimationFrame(tick);
            } else {
              tokenRollState.rafId = 0;
              tokenRollState.timers.push(
                window.setTimeout(function () {
                  if (tokenRollState.mode === "live") {
                    playCompletionEffect(root);
                  }
                }, lockMs),
              );
            }
          }

          tokenRollState.rafId = window.requestAnimationFrame(tick);
        }

        function renderLoadingTokenPanel() {
          return (
            '<div class="token-side">' +
            renderTokenFace(
              { inputTokens: 0, outputTokens: 0, totalTokens: 0 },
              0,
              "This tool call",
              {
                faceClass: "token-face-live token-face-loading",
                animate: true,
              },
            ) +
            "</div>"
          );
        }

        function playLoadingTokenAnimation(root) {
          stopTokenRollAnimation();
          tokenRollState.signature = "";
          tokenRollState.mode = "loading";

          var loadingFace = root.querySelector(".token-face-loading");
          if (!loadingFace) return;

          var lines = {
            input: loadingFace.querySelector(
              '.token-line[data-token-kind="input"]',
            ),
            output: loadingFace.querySelector(
              '.token-line[data-token-kind="output"]',
            ),
            total: loadingFace.querySelector(
              '.token-line[data-token-kind="total"]',
            ),
            price: loadingFace.querySelector(
              '.token-line[data-token-kind="price"]',
            ),
          };
          var lineKeys = Object.keys(lines).filter(function (key) {
            return !!lines[key];
          });
          if (lineKeys.length === 0) return;
          var started = performance.now();

          lineKeys.forEach(function (key) {
            lines[key].classList.add("is-rolling");
          });

          function loadingUsage(elapsed) {
            var seconds = Math.max(0, elapsed) / 1000;
            var input =
              1 + Math.floor(seconds * 3 + Math.pow(seconds, 1.22) * 4);
            var output =
              1 + Math.floor(seconds * 5 + Math.pow(seconds, 1.28) * 7);
            return {
              input: input,
              output: output,
              total: input + output,
            };
          }

          function applyFrame(now) {
            var usage = loadingUsage(now - started);
            var ghostUsage = {
              input:
                usage.input + Math.max(1, Math.floor(2 + usage.input * 0.08)),
              output:
                usage.output + Math.max(2, Math.floor(4 + usage.output * 0.08)),
            };
            ghostUsage.total = ghostUsage.input + ghostUsage.output;

            var nextText = {
              input: formatTokenCompact(usage.input),
              output: formatTokenCompact(usage.output),
              total: formatTokenCompact(usage.total),
              price: formatUsdAnimated(
                estimateGpt54TurnCostUsd({
                  inputTokens: usage.input,
                  outputTokens: usage.output,
                }),
              ),
            };
            var ghostText = {
              input: formatTokenCompact(ghostUsage.input),
              output: formatTokenCompact(ghostUsage.output),
              total: formatTokenCompact(ghostUsage.total),
              price: formatUsdAnimated(
                estimateGpt54TurnCostUsd({
                  inputTokens: ghostUsage.input,
                  outputTokens: ghostUsage.output,
                }),
              ),
            };

            lineKeys.forEach(function (key) {
              var line = lines[key];
              var value = line.querySelector(".token-value-text");
              var ghost = line.querySelector(".token-value-ghost");
              value.textContent = nextText[key];
              ghost.textContent = ghostText[key];
            });
          }

          function tick(now) {
            if (tokenRollState.mode !== "loading") {
              tokenRollState.rafId = 0;
              return;
            }
            applyFrame(now);
            tokenRollState.rafId = window.requestAnimationFrame(tick);
          }

          applyFrame(started);
          tokenRollState.rafId = window.requestAnimationFrame(tick);
        }

        function autoScrollToFirstChange() {
          var openFile = document.querySelector("details.file[open]");
          if (!openFile) return;

          var diff = openFile.querySelector(".diff");
          if (!diff) return;

          var firstChange = diff.querySelector(".dline.add, .dline.del");
          if (!firstChange) return;

          var targetTop =
            firstChange.offsetTop - Math.floor(diff.clientHeight * 0.35);
          diff.scrollTop = targetTop > 0 ? targetTop : 0;
        }

        function render() {
          var root = document.getElementById("root");
          if (!root) return;
          var fromLoading = tokenRollState.mode === "loading";

          var isFinal = view.panelMode === "final_review";
          var isCatDeskInstruction =
            view.panelMode === "tool_call" &&
            view.toolName === "catdesk_instruction";
          var isRunCommand =
            view.panelMode === "tool_call" && view.toolName === "run_command";
          var isSearchText =
            view.panelMode === "tool_call" && view.toolName === "search_text";
          var isReadFile =
            view.panelMode === "tool_call" && view.toolName === "read_file";
          var isListFiles =
            view.panelMode === "tool_call" && view.toolName === "list_files";
          var filesEmpty = isFinal
            ? "No pending changed files."
            : "No file changes in this tool call.";
          var filesOpenCount = view.changedFiles.length > 0 ? 1 : 0;
          var instructionSectionHtml = "";
          if (isCatDeskInstruction) {
            instructionSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderCatDeskInstructionPanel(view) +
              "</div>" +
              "</section>";
          }
          var commandSectionHtml = "";
          if (isRunCommand) {
            commandSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderCommandPanel(view) +
              "</div>" +
              "</section>";
          }
          var searchSectionHtml = "";
          if (isSearchText) {
            searchSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderSearchPanel(view) +
              "</div>" +
              "</section>";
          }
          var readFileSectionHtml = "";
          if (isReadFile) {
            readFileSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderReadFilePanel(view) +
              "</div>" +
              "</section>";
          }
          var listSectionHtml = "";
          if (isListFiles) {
            listSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderListFilesPanel(view) +
              "</div>" +
              "</section>";
          }
          var detailSectionHtml = "";
          if (view.call || view.detail) {
            detailSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderToolDetailPanel(view) +
              "</div>" +
              "</section>";
          }
          var filesSectionHtml = "";
          if (
            (!isCatDeskInstruction &&
              !isRunCommand &&
              !isSearchText &&
              !isReadFile &&
              !isListFiles) ||
            view.hasChanges
          ) {
            filesSectionHtml =
              '<section class="section">' +
              '<div class="section-body">' +
              renderFileList(view.changedFiles, {
                emptyText: filesEmpty,
                openCount: filesOpenCount,
              }) +
              "</div>" +
              "</section>";
          }
          var tokenPanelHtml = renderTurnToken(view);
          var mainContentHtml =
            instructionSectionHtml +
            commandSectionHtml +
            searchSectionHtml +
            readFileSectionHtml +
            listSectionHtml +
            detailSectionHtml +
            filesSectionHtml;
          var contentRowHtml = "";
          if (mainContentHtml && tokenPanelHtml) {
            contentRowHtml =
              '<div class="files-token-row">' +
              '<div class="main-stack">' +
              mainContentHtml +
              "</div>" +
              tokenPanelHtml +
              "</div>";
          } else if (mainContentHtml) {
            contentRowHtml = mainContentHtml;
          } else if (tokenPanelHtml) {
            contentRowHtml = tokenPanelHtml;
          }
          var wrappedContentHtml = contentRowHtml
            ? '<div class="completion-shell">' + contentRowHtml + "</div>"
            : "";
          stopTokenRollAnimation();
          stopInstructionMascotAnimation();

          root.innerHTML =
            '<section class="root">' + wrappedContentHtml + "</section>";

          var instructionHero = root.querySelector(".instruction-hero");
          if (instructionHero) {
            bindInstructionReplay(instructionHero, view);
          }
          bindBinagotchyBrowser(root);

          playLiveTokenAnimation(root, view, { fromLoading: fromLoading });
          if (fromLoading && !shouldAnimateLiveTokenFace(view)) {
            playCompletionEffect(root);
          }

          window.requestAnimationFrame(autoScrollToFirstChange);
        }

        function renderLoading(text) {
          var root = document.getElementById("root");
          if (!root) return;
          stopTokenRollAnimation();
          stopInstructionMascotAnimation();
          tokenRollState.signature = "";
          root.innerHTML =
            '<section class="root">' +
            '<div class="files-token-row">' +
            '<div class="main-stack">' +
            '<section class="section">' +
            '<div class="section-body">' +
            '<div class="empty loading">' +
            esc(text) +
            "</div>" +
            "</div>" +
            "</section>" +
            "</div>" +
            renderLoadingTokenPanel() +
            "</div>" +
            "</section>";
          playLoadingTokenAnimation(root);
        }

        function renderPayloadError(title, detail, diagnostics) {
          var root = document.getElementById("root");
          if (!root) return;
          stopTokenRollAnimation();
          stopInstructionMascotAnimation();
          tokenRollState.signature = "";
          var diagnosticsHtml = diagnostics
            ? '<div class="search-note">' +
              esc(
                "diagnostics: " +
                  diagnostics.status +
                  " / hasWidgetPayload=" +
                  String(!!diagnostics.hasWidgetPayload),
              ) +
              "</div>"
            : "";
          root.innerHTML =
            '<section class="root">' +
            '<section class="section">' +
            '<div class="section-body">' +
            '<div class="command-panel">' +
            '<div class="panel-head"><div class="panel-title">' +
            esc(title) +
            "</div></div>" +
            '<pre class="command-output">' +
            esc(detail) +
            "</pre>" +
            diagnosticsHtml +
            "</div>" +
            "</div>" +
            "</section>" +
            "</section>";
        }

        function currentToolResponseMetadata() {
          if (!window.openai) return null;
          return window.openai.toolResponseMetadata || null;
        }

        function hasPureMetaPayload(toolResponseMetadata) {
          return !!(
            toolResponseMetadata &&
            typeof toolResponseMetadata === "object" &&
            toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] &&
            typeof toolResponseMetadata[WIDGET_PAYLOAD_META_KEY] === "object" &&
            toolResponseMetadata[WIDGET_PAYLOAD_META_KEY].schema ===
              "catdesk.review.v1"
          );
        }

        function applyPayload(toolResponseMetadata) {
          var root = document.getElementById("root");
          if (!root) return false;
          var diagnostics = inspectPayloadDiagnostics(toolResponseMetadata);
          var widgetPayload = extractWidgetPayload(toolResponseMetadata);
          if (!widgetPayload) {
            renderPayloadError(
              "Widget Payload Missing",
              "Tool response metadata does not contain a valid catdesk/widgetPayload object.",
              diagnostics,
            );
            return false;
          }
          var parsed = buildViewFromWidgetPayload(widgetPayload);
          if (!parsed.ok) {
            renderPayloadError("Invalid Widget Payload", parsed.error, diagnostics);
            return false;
          }
          var nextView = parsed.value;
          nextView.payloadDiagnostics = diagnostics;
          if (
            nextView.panelMode === "tool_call" &&
            !nextView.hasChanges &&
            nextView.toolName !== "catdesk_instruction" &&
            nextView.toolName !== "run_command" &&
            nextView.toolName !== "search_text" &&
            nextView.toolName !== "read_file" &&
            nextView.toolName !== "list_files" &&
            !nextView.call &&
            !nextView.detail &&
            nextView.turnTokenUsage.totalTokens <= 0 &&
            nextView.toolCallCount <= 0
          ) {
            stopTokenRollAnimation();
            stopInstructionMascotAnimation();
            root.innerHTML = "";
            return true;
          }
          view = nextView;
          render();
          return true;
        }

        window.addEventListener("message", function (event) {
          if (event.source !== window.parent) return;
          var message = event.data;
          if (!message || typeof message !== "object") return;
          if (message.method === "ui/notifications/tool-result") {
            var toolResponseMetadata = currentToolResponseMetadata();
            if (!hasPureMetaPayload(toolResponseMetadata)) return;
            applyPayload(toolResponseMetadata);
          }
        });

        window.addEventListener(
          "openai:set_globals",
          function (event) {
            var globals = event && event.detail ? event.detail.globals : null;
            if (globals) {
              var globalsToolResponseMetadata =
                globals.toolResponseMetadata || null;
              if (hasPureMetaPayload(globalsToolResponseMetadata)) {
                applyPayload(globalsToolResponseMetadata);
              }
              return;
            }
            var toolResponseMetadata = currentToolResponseMetadata();
            if (hasPureMetaPayload(toolResponseMetadata)) {
              applyPayload(toolResponseMetadata);
            }
          },
          { passive: true },
        );

        renderLoading("Waiting for tool output...");
        var initialToolResponseMetadata = currentToolResponseMetadata();
        if (hasPureMetaPayload(initialToolResponseMetadata)) {
          applyPayload(initialToolResponseMetadata);
        }
      })();
    </script>
  </body>
</html>
